<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
:root{
  --gold:#c9a84c;--gold-l:#e8d48b;--gold-d:#8b6914;
  --bg:#0a0a12;--bg2:#111119;
  --card:rgba(255,255,255,0.035);--card-b:rgba(255,255,255,0.07);
  --t1:#fff;--t2:#aaa;--t3:#666;
  --edge:#2C2C34;--bloom:#7B68EE;--easy:#E8E8E8;--drop:#3D1C6E;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'Noto Sans SC',-apple-system,sans-serif;touch-action:manipulation}
#app{width:100%;height:100%;position:relative;overflow:hidden}

/* PAGE */
.p{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;opacity:0;transform:translateX(50px);transition:opacity .4s,transform .4s;pointer-events:none;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.p.on{opacity:1;transform:translateX(0);pointer-events:auto;z-index:2}
.p.out{opacity:0;transform:translateX(-50px);z-index:1}
.pi{padding:48px 24px 40px;flex:1}
.serif{font-family:'Noto Serif SC',serif}

/* BTN */
.btn{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--gold),var(--gold-d));border:none;border-radius:14px;padding:16px;font-size:16px;color:#000;font-weight:700;letter-spacing:2px;cursor:pointer;width:100%;font-family:'Noto Sans SC',sans-serif;transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn-g{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--gold);font-weight:500}
.btn-g:active{background:rgba(201,168,76,.06)}
.btn-s{padding:12px 20px;font-size:14px;width:auto;border-radius:12px}

/* SPLASH */
#s0{background:radial-gradient(ellipse at 50% 38%,#1a1520,var(--bg) 70%);justify-content:center;align-items:center;text-align:center}
.logo{font-family:'Noto Serif SC',serif;font-size:68px;font-weight:900;color:var(--gold);letter-spacing:10px;text-shadow:0 0 50px rgba(201,168,76,.2);animation:pop .9s ease-out}
@keyframes pop{0%{opacity:0;transform:scale(.8) translateY(16px)}100%{opacity:1;transform:none}}
.logo-s{font-size:13px;color:var(--t3);letter-spacing:6px;margin:6px 0 10px;animation:fu .8s ease .2s both}
.logo-jam{font-size:14px;color:var(--gold);letter-spacing:3px;opacity:.7;margin-bottom:52px;animation:fu .8s ease .35s both}
@keyframes fu{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:none}}
.ring{width:150px;height:150px;border:2px solid rgba(201,168,76,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:rp 2.5s ease-in-out infinite,fu .8s ease .5s both;transition:transform .15s}
.ring:active{transform:scale(.95)}
@keyframes rp{0%,100%{border-color:rgba(201,168,76,.2);box-shadow:0 0 0 0 rgba(201,168,76,.1)}50%{border-color:rgba(201,168,76,.55);box-shadow:0 0 35px 6px rgba(201,168,76,.06)}}
.ring-t{font-size:17px;color:var(--gold);letter-spacing:3px}
.hint{font-size:12px;color:var(--t3);margin-top:18px;animation:fu .8s ease .7s both}

/* GENDER */
#sGender{background:radial-gradient(ellipse at 50% 40%,#1a1520,var(--bg) 70%)}
.gw{display:flex;gap:24px;justify-content:center;margin-top:36px}
.gc{width:140px;padding:32px 16px 28px;border-radius:22px;background:var(--card);border:2px solid var(--card-b);text-align:center;cursor:pointer;transition:all .25s}
.gc:active{transform:scale(.95)}
.gc.sel{border-color:var(--gold);background:rgba(201,168,76,.08);box-shadow:0 0 20px rgba(201,168,76,.1)}
.gc-icon{font-size:52px;margin-bottom:12px}
.gc-label{font-size:16px;color:var(--t2);letter-spacing:3px;font-weight:500}
.gc.sel .gc-label{color:var(--gold)}

/* QUESTIONS */
.qbar{display:flex;gap:4px;margin-bottom:24px}
.qb{height:4px;flex:1;border-radius:2px;background:#1a1a24;transition:background .35s}
.qb.d{background:var(--gold)}.qb.c{background:linear-gradient(90deg,var(--gold),#333)}
.qn{font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:8px}
.qt{font-family:'Noto Serif SC',serif;font-size:20px;line-height:1.65;margin-bottom:24px}
.qo{display:flex;flex-direction:column;gap:10px}
.qopt{background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;-webkit-user-select:none;user-select:none}
.qopt:active{transform:scale(.98)}
.qopt .em{font-size:24px;flex-shrink:0}
.qopt .lb{font-size:13px;color:var(--t2);line-height:1.5}
.qopt.sel{background:rgba(201,168,76,.1);border-color:var(--gold)}
.qopt.sel .lb{color:var(--gold)}
.qopt.dis{opacity:.35;pointer-events:none}
.multi-hint{font-size:11px;color:var(--t3);margin-top:8px;text-align:center}

/* LOADING */
#sLoad{justify-content:center;align-items:center;background:radial-gradient(ellipse at 50% 50%,#1a1520,var(--bg) 55%)}
.spin{width:100px;height:100px;border:3px solid rgba(201,168,76,.12);border-top-color:var(--gold);border-radius:50%;animation:sp 1s linear infinite;margin-bottom:24px}
@keyframes sp{to{transform:rotate(360deg)}}

/* RESULT */
.rc{border-radius:24px;padding:28px 20px;text-align:center;margin-bottom:22px;animation:rpop .55s cubic-bezier(.34,1.56,.64,1)}
@keyframes rpop{0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
.rc-edge{background:linear-gradient(135deg,rgba(44,44,52,.5),rgba(44,44,52,.2));border:1px solid rgba(44,44,52,.6)}
.rc-bloom{background:linear-gradient(135deg,rgba(123,104,238,.15),rgba(176,196,222,.08));border:1px solid rgba(123,104,238,.3)}
.rc-easy{background:linear-gradient(135deg,rgba(232,232,232,.1),rgba(245,245,247,.05));border:1px solid rgba(232,232,232,.2)}
.rc-drop{background:linear-gradient(135deg,rgba(61,28,110,.25),rgba(26,10,46,.15));border:1px solid rgba(61,28,110,.4)}

/* PORTRAIT */
.portrait{width:180px;height:180px;border-radius:50%;object-fit:cover;margin:0 auto 14px;display:block;border:3px solid rgba(201,168,76,.25);box-shadow:0 0 40px rgba(201,168,76,.08);animation:rpop .6s cubic-bezier(.34,1.56,.64,1)}
.portrait-sm{width:58px;height:58px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.portrait-xs{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,.3)}
.emoji-fb{font-size:56px;text-align:center;margin-bottom:2px}

.rn{font-family:'Noto Serif SC',serif;font-size:26px;color:var(--gold)}
.re{font-size:12px;color:var(--t3);letter-spacing:5px;margin-bottom:10px}
.rl{font-size:13px;color:var(--t2);margin-bottom:10px;letter-spacing:2px}
.rd{font-size:13px;color:var(--t2);line-height:1.85;text-align:left}
.rt{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:14px}
.rtg{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.15);border-radius:18px;padding:4px 12px;font-size:11px;color:var(--gold)}
.rec{background:var(--card);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin:10px 0 8px}
.bot{width:38px;height:54px;background:linear-gradient(180deg,var(--gold),var(--gold-d));border-radius:5px 5px 3px 3px;position:relative;flex-shrink:0}
.bot::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:13px;height:8px;background:var(--gold);border-radius:3px 3px 0 0}

/* VOTE */
.vc{background:var(--card);border:1px solid var(--card-b);border-radius:18px;padding:16px 18px;margin-bottom:11px;cursor:pointer;transition:all .25s}
.vc:active{transform:scale(.98)}
.vc.vd{border-color:var(--gold);background:rgba(201,168,76,.06)}
.vct{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.vck{width:24px;height:24px;border:2px solid #333;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;flex-shrink:0}
.vc.vd .vck{border-color:var(--gold);background:var(--gold);color:#000}
.vbg{height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;margin-bottom:5px}
.vbf{height:100%;border-radius:3px;transition:width .7s ease}
.vbg-g{background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.vbg-d{background:rgba(201,168,76,.25)}
.nb{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.18);border-radius:16px;padding:22px;text-align:center;margin:18px 0}

/* PROFILE */
.ph{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.pb{display:inline-flex;align-items:center;gap:4px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:18px;padding:3px 10px;font-size:11px;color:var(--gold);margin-top:3px}
.sts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.st{background:var(--card);border-radius:14px;padding:14px 6px;text-align:center}
.stn{font-size:24px;color:var(--gold);font-weight:700}
.stl{font-size:10px;color:var(--t3);margin-top:2px}
.dn{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.02));border:1px solid rgba(201,168,76,.15);border-radius:18px;padding:18px;margin-bottom:20px}
.dr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.dl{font-size:11px;color:var(--t3);width:32px}
.dt{flex:1;height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.df{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:3px;transition:width .8s ease .3s}
.dv{font-size:11px;color:var(--gold);width:24px;text-align:right}
.stit{font-size:12px;color:var(--t3);letter-spacing:2px;margin-bottom:12px}
.tl{position:relative;padding-left:20px}
.tl::before{content:'';position:absolute;left:4px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold),rgba(201,168,76,.06))}
.ti{position:relative;margin-bottom:16px;padding-left:12px}
.ti::before{content:'';position:absolute;left:-20px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--gold);border:2px solid var(--bg)}
.td{font-size:10px;color:var(--t3)}
.tt{font-size:13px;color:var(--t2);margin-top:1px;line-height:1.5}
.fm{font-family:'Noto Serif SC',serif;font-size:18px;line-height:1.9;color:var(--gold);text-align:center;margin:32px 0;opacity:0;animation:ff 1.2s ease .4s forwards}
@keyframes ff{to{opacity:1}}
.share-row{display:flex;gap:10px;margin-top:16px}
.share-row .btn{flex:1}
.foot{text-align:center;padding:20px;font-size:10px;color:#333}
</style>
</head>
<body>
<div id="app">

<!-- S0: Splash -->
<div class="p on" id="s0">
<div class="pi" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
  <div class="logo">共醸</div>

  <div class="ring" onclick="go('sGender')"><div class="ring-t">发现你的<br>味觉DNA</div></div>

</div>

<div class="p" id="sGender">

  <div style="font-size:11px;color:var(--gold);letter-spacing:4px;margin-bottom:10px">开始之前</div>

</div>
</div>

<!-- S1-S8: Questions (JS rendered) -->
<div class="p" id="s1"></div>
<div class="p" id="s2"></div>
<div class="p" id="s3"></div>
<div class="p" id="s4"></div>
<div class="p" id="s5"></div>
<div class="p" id="s6"></div>
<div class="p" id="s7"></div>
<div class="p" id="s8"></div>

<!-- Loading -->
<div class="p" id="sLoad">
  <div class="spin"></div>

<!-- Result -->
<div class="p" id="sResult"></div>
<!-- Vote -->
<div class="p" id="sVote"></div>
<!-- Vote Success -->
<div class="p" id="sVoted"></div>
<!-- Delivery -->
<div class="p" id="sDeliv"></div>
<!-- Profile -->
<div class="p" id="sProf"></div>

</div>
<script>
// ============================================================
//  CONFIG — Google Form integration
// ============================================================
const GFORM = {
  url: 'https://docs.google.com/forms/d/e/1FAIpQLSfCCaYjNksMk6Kj573kFMSZcZS3CyvIw_8_l6wauRVS5jFZHg/formResponse',
  fields: { q1:'entry.905007414',q2:'entry.442708248',q3:'entry.1953080681',q4:'entry.730841696',q5:'entry.340337848',q6:'entry.724422571',q7:'entry.1925142714',q8:'entry.1179538010',result:'entry.429783184',timestamp:'entry.33692191' }
};
function submitToGForm(data){
  if(!GFORM.url)return;
  const fd=new FormData();
  Object.keys(data).forEach(k=>{if(GFORM.fields[k])fd.append(GFORM.fields[k],data[k]);});
  fd.append(GFORM.fields.timestamp,new Date().toISOString());
  fetch(GFORM.url,{method:'POST',mode:'no-cors',body:fd}).catch(()=>{});
}

// ============================================================
//  STATE
// ============================================================
let curPage='s0';
let userGender='m'; // 'm' or 'f'
let ans=new Array(8).fill(null);
let votedI=-1;

// ============================================================
//  GENDER SELECTION
// ============================================================
function pickGender(g,el){
  userGender=g;
  if(navigator.vibrate)navigator.vibrate(8);
  document.querySelectorAll('.gc').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  setTimeout(()=>go('s1'),450);
}

// ============================================================
//  8 QUESTIONS — from TOMO_系统规范_v1.0 §2.3
// ============================================================
const Q=[

      {e:'👥',t:'和两三个朋友聊天',code:'scene_small'},

  { id:'q8', title:'你喝酒，<br>通常是因为——',

// ============================================================
//  12 PERSONAS — from TOMO_系统规范_v1.0 §3.2 + §4.1

// ============================================================

Q.forEach((q,qi)=>{
  const el=document.getElementById('s'+(qi+1));
  const barHTML=Array.from({length:8},(_,i)=>`<div class="qb ${i<qi?'d':i===qi?'c':''}"></div>`).join('');
  const multiNote=q.multi?`<div class="multi-hint">可多选，最多 ${q.maxSel} 个</div>`:'';
  el.innerHTML=`<div class="pi">

    ${multiNote}
  </div>`;
});

function pick(qi,oi,el){
  const q=Q[qi];
  if(navigator.vibrate)navigator.vibrate(8);

  if(q.multi){
    let sel=ans[qi];
    if(!Array.isArray(sel))sel=[];
    const idx=sel.indexOf(oi);
    if(idx>=0){
      sel.splice(idx,1);
      el.classList.remove('sel');
    }else{
      if(sel.length>=q.maxSel){
        const oldest=sel.shift();
        document.querySelector(`#qo${qi} [data-oi="${oldest}"]`).classList.remove('sel');
      }
      sel.push(oi);
      el.classList.add('sel');
    }
    ans[qi]=sel.length?[...sel]:null;
    if(q.o[oi].code==='aroma_null'&&sel.includes(oi)){
      sel.forEach(s=>{if(s!==oi)document.querySelector(`#qo${qi} [data-oi="${s}"]`).classList.remove('sel');});
      ans[qi]=[oi];
    }else if(sel.length>0&&sel.some(s=>q.o[s].code==='aroma_null')&&q.o[oi].code!=='aroma_null'){
      const ni=sel.indexOf(q.o.findIndex(o=>o.code==='aroma_null'));
      if(ni>=0){sel.splice(ni,1);document.querySelector(`#qo${qi} [data-oi="${q.o.findIndex(o=>o.code==='aroma_null')}"]`).classList.remove('sel');}
      ans[qi]=[...sel];
    }
    if((ans[qi]&&ans[qi].length>=q.maxSel)||q.o[oi].code==='aroma_null'){
      setTimeout(()=>advance(qi),600);
    }
  }else{
    ans[qi]=oi;
    el.closest('.qo').querySelectorAll('.qopt').forEach(o=>o.classList.remove('sel'));
    el.classList.add('sel');
    setTimeout(()=>advance(qi),350);
  }
}

function advance(qi){
  if(qi<7) go('s'+(qi+2));
  else{ go('sLoad'); setTimeout(showResult,1800); }
}

// ============================================================
//  SCORING ALGORITHM — TOMO_系统规范 §2.4
// ============================================================
function getCode(qi){
  const a=ans[qi];
  if(a===null||a===undefined)return[];
  if(Array.isArray(a))return a.map(i=>Q[qi].o[i].code);
  return[Q[qi].o[a].code];
}
function has(qi,code){return getCode(qi).includes(code);}
function q3val(){
  const a=ans[2];
  if(a===null)return 0;
  const c=Q[2].o[a].code;
  return parseInt(c.replace('bitter_',''))||0;
}

function calcPersona(){
  let sE=0,sB=0,sD=0;

  // Q1 Visual
  if(has(0,'visual_dark'))sE+=2;
  else if(has(0,'visual_light'))sD+=2;
  else if(has(0,'visual_medium'))sB+=1;

  // Q2 Aroma
  const q2=getCode(1);
  q2.forEach(c=>{
    if(c==='aroma_herbal')sE+=3;
    else if(c==='aroma_fruit')sB+=3;
    else if(c==='aroma_roast'){/* cross with Q3 */}
    else if(c==='aroma_alcohol')sE+=1;
    else if(c==='aroma_null')sD+=2;
  });
  if(q2.includes('aroma_roast')){
    if(q3val()>=3)sE+=2;else sD+=1;
  }

  // Q3 Bitter intensity
  const bv=q3val();
  if(bv===4)sE+=4;
  else if(bv===3)sE+=3;
  else if(bv===2)sB+=1;
  else if(bv===1)sD+=3;
  else if(bv===5){sD+=4;sE-=3;}

  // Q5 Aftertaste
  if(has(4,'aftertaste_clean'))sD+=2;
  else if(has(4,'aftertaste_heavy')){
    if(sE>sB&&sE>sD)sE+=2;else sB+=2;
  }
  else if(has(4,'aftertaste_astringent'))sE+=1;
  else if(has(4,'aftertaste_null'))sD+=1;
  if(has(4,'aftertaste_heavy')&&q2.includes('aroma_roast'))sE+=1;

  // Q8 Motive
  if(has(7,'motive_taste'))sE+=2;

  // Step 1: Primary quadrant
  const scores={edge:sE,bloom:sB,easy:sD};
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const primary=sorted[0][0];

  // Step 2: Cross-quadrant specials
  if(primary==='bloom'&&has(6,'accept_repeat')&&!has(7,'motive_social'))return PERSONAS[9];
  if(primary==='edge'&&has(7,'motive_feeling')&&has(5,'scene_solo'))return PERSONAS[10];
  if(has(7,'motive_null')&&has(6,'accept_explore'))return PERSONAS[11];

  // Step 3: Sub-persona
  if(primary==='edge'){
    if(q3val()>=3&&has(3,'bitter_pos_throat'))return PERSONAS[0];
    if(q3val()>=3&&has(3,'bitter_pos_side'))return PERSONAS[1];
    if(q2.includes('aroma_herbal')&&has(3,'bitter_pos_tip'))return PERSONAS[2];
    return PERSONAS[1];
  }
  if(primary==='bloom'){
    if(has(4,'aftertaste_heavy')||q2.includes('aroma_roast'))return PERSONAS[3];
    if(has(7,'motive_social')||has(5,'scene_crowd'))return PERSONAS[4];
    if(has(4,'aftertaste_clean')&&has(0,'visual_light'))return PERSONAS[5];
    return PERSONAS[3];
  }
  if(primary==='easy'){
    if(q2.includes('aroma_fruit')&&has(6,'accept_explore'))return PERSONAS[6];
    if(q2.includes('aroma_roast')&&has(7,'motive_taste'))return PERSONAS[7];
    if(has(4,'aftertaste_heavy')&&!has(0,'visual_light'))return PERSONAS[8];
    return PERSONAS[6];
  }
  return PERSONAS[6];
}

// ============================================================
//  SHARE
// ============================================================
function share(){
  const p=calcPersona();
  const gLabel=userGender==='f'?'她':'他';
  const txt=`我的味觉DNA是 ${p.suit} ${p.bio}（${p.pro}）！${p.motto}\n${gLabel}的味觉人格已觉醒\nhttps://joychan777777.github.io/tomo-taste/\n#共醸 #JAM即兴精酿 #TOMO`;
  if(navigator.share){
    navigator.share({title:'我的味觉DNA',text:txt,url:'https://joychan777777.github.io/tomo-taste/'}).catch(()=>{});
  }else{
    navigator.clipboard.writeText(txt).then(()=>alert('已复制到剪贴板，去朋友圈粘贴吧！')).catch(()=>alert(txt));
  }
}

// ============================================================
//  NAVIGATION
// ============================================================
function go(id){
  document.querySelectorAll('.p').forEach(p=>{
    if(p.id===curPage){p.classList.remove('on');p.classList.add('out');setTimeout(()=>p.classList.remove('out'),450);}
  });
  const target=document.getElementById(id);
  if(target){target.classList.add('on');target.scrollTop=0;}
  curPage=id;
}
function restart(){
  votedI=-1;ans.fill(null);userGender='m';
  Q.forEach((q,qi)=>{
    document.querySelectorAll(`#qo${qi} .qopt`).forEach(o=>o.classList.remove('sel'));
  });
  document.querySelectorAll('.gc').forEach(c=>c.classList.remove('sel'));
  document.querySelectorAll('.p').forEach(p=>{p.classList.remove('on','out');});
  document.getElementById('s0').classList.add('on');curPage='s0';
}
</script>
