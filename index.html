<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="format-detection" content="telephone=no">
<title>TOMO · 共醸味觉DNA</title>
<meta name="description" content="8道感官题，找到你的味觉人格。共醸 GÒNNIANG · JAM即兴精酿">
<meta property="og:title" content="你是哪种味觉人格？">
<meta property="og:description" content="8道感官题，发现你的味觉DNA。共醸 · JAM即兴精酿">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍺</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  /* Direction A · Midnight Amber */
  --gold:#D1AE6B;--gold-l:#E8D48B;--gold-d:#8C6B40;
  --gold-glow:rgba(209,174,107,0.15);--gold-subtle:rgba(209,174,107,0.06);
  /* 深色背景层级 */
  --bg:#2C2C34;--bg2:#252530;--bg3:#1E1E28;--bg4:#171720;
  /* 磨砂玻璃层（暗玻璃 on 深底） */
  --glass:rgba(255,255,255,0.06);--glass-h:rgba(255,255,255,0.1);
  --glass-b:rgba(255,255,255,0.08);--glass-bh:rgba(255,255,255,0.14);
  --card:rgba(255,255,255,0.05);--card-b:rgba(255,255,255,0.08);
  /* 文字层级（浅色 on 深底） */
  --t1:rgba(242,235,222,0.92);--t2:rgba(242,235,222,0.6);--t3:rgba(242,235,222,0.35);
  /* 泡沫白 */
  --foam:#F2EBDE;
  /* 象限色（适配深色底） */
  --edge:#8A9AB5;--bloom:#9B8AE0;--easy:#B0B0B8;--drop:#7B5AAE;
  /* 字体 */
  --f-display:'Space Grotesk','Noto Sans SC',sans-serif;
  --f-body:'Inter','Noto Sans SC',-apple-system,sans-serif;
  --f-serif:'Noto Serif SC',serif;
  /* 辅助 */
  --shadow:0 2px 16px rgba(0,0,0,0.2),0 1px 4px rgba(0,0,0,0.15);
  --shadow-lg:0 8px 32px rgba(0,0,0,0.3),0 2px 8px rgba(0,0,0,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#1E1E28;color:var(--t1);font-family:var(--f-body);touch-action:manipulation;-webkit-font-smoothing:antialiased}
#app{width:100%;height:100%;position:relative;overflow:hidden;background:url('beer-bg.jpg') center/cover no-repeat fixed}

/* 水珠动画画布 */
#dropCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
/* PAGE — 升级转场动效 */
.p{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateY(30px) scale(.97);transition:opacity .45s cubic-bezier(.22,1,.36,1),transform .45s cubic-bezier(.22,1,.36,1);pointer-events:none;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);will-change:opacity,transform}
.p.on{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;z-index:2}
.p.out{opacity:0;transform:translateY(-20px) scale(.98);z-index:1}
.pi{padding:48px 24px 40px;flex:1;width:100%;max-width:420px;margin:0 auto}
.serif{font-family:var(--f-serif)}
.display{font-family:var(--f-display)}

/* BTN */
.btn{display:flex;align-items:center;justify-content:center;background:var(--gold);border:none;border-radius:9999px;padding:16px 24px;font-size:15px;color:#fff;font-weight:600;letter-spacing:0.02em;cursor:pointer;width:100%;font-family:var(--f-body);transition:all .25s ease;box-shadow:0 4px 16px rgba(160,133,53,0.2)}
.btn:hover{background:var(--gold-l);box-shadow:0 6px 24px rgba(160,133,53,0.25)}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);color:var(--t1);font-weight:500;box-shadow:var(--shadow)}
.btn-g:hover{background:var(--glass-h);border-color:var(--glass-bh)}
.btn-g:active{background:rgba(160,133,53,.08)}
.btn-s{padding:12px 20px;font-size:14px;width:auto;border-radius:9999px}

/* All pages get dark bg by default, splash stays transparent for beer-bg.jpg */
.p{background:var(--bg)}
/* SPLASH */
#s0{background:transparent;justify-content:center;align-items:center;text-align:center}
.logo{font-family:var(--f-serif);font-size:80px;font-weight:900;color:#fff;letter-spacing:12px;text-shadow:0 3px 16px rgba(0,0,0,0.5),0 1px 4px rgba(0,0,0,0.3);animation:pop .9s ease-out}
@keyframes pop{0%{opacity:0;transform:scale(.8) translateY(16px)}100%{opacity:1;transform:none}}
.logo-s{font-size:15px;color:rgba(255,255,255,0.8);letter-spacing:6px;margin:8px 0 12px;text-shadow:0 2px 8px rgba(0,0,0,0.4);animation:fu .8s ease .2s both}
.logo-jam{font-size:16px;color:rgba(255,255,255,0.85);letter-spacing:3px;margin-bottom:48px;text-shadow:0 2px 8px rgba(0,0,0,0.35);animation:fu .8s ease .35s both}
@keyframes fu{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:none}}
.ring{width:160px;height:160px;border:2.5px solid rgba(255,255,255,.5);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:rp 2.5s ease-in-out infinite,fu .8s ease .5s both;transition:transform .15s;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(255,255,255,0.3);box-shadow:0 6px 32px rgba(0,0,0,0.2),inset 0 1px 1px rgba(255,255,255,0.3)}
.ring:active{transform:scale(.95)}
@keyframes rp{0%,100%{border-color:rgba(160,133,53,.15);box-shadow:var(--shadow)}50%{border-color:rgba(160,133,53,.4);box-shadow:0 4px 32px rgba(160,133,53,.12)}}
.ring-t{font-family:var(--f-display);font-size:18px;color:#fff;font-weight:600;letter-spacing:0.08em;text-shadow:0 2px 8px rgba(0,0,0,0.3)}
.hint{font-size:14px;color:rgba(255,255,255,0.7);margin-top:18px;text-shadow:0 1px 6px rgba(0,0,0,0.3);animation:fu .8s ease .7s both}

/* GENDER */
#sGender{background:var(--bg)}
.gw{display:flex;gap:24px;justify-content:center;margin-top:36px}
.gc{width:140px;padding:32px 16px 28px;border-radius:24px;background:var(--glass);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid var(--glass-b);text-align:center;cursor:pointer;transition:all .35s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow)}
.gc:hover{background:var(--glass-h);border-color:var(--glass-bh);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.gc:active{transform:scale(.93);transition-duration:.1s}
.gc.sel{border-color:rgba(209,174,107,.4);background:rgba(209,174,107,.1);box-shadow:0 8px 32px rgba(209,174,107,.15),0 0 0 1px rgba(209,174,107,.15) inset;transform:translateY(-2px)}
.gc-icon{font-size:52px;margin-bottom:12px;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.gc.sel .gc-icon{transform:scale(1.15)}
.gc-label{font-size:16px;color:var(--t2);letter-spacing:3px;font-weight:500;transition:color .3s}
.gc.sel .gc-label{color:var(--gold)}

/* QUESTIONS */
.qbar{display:flex;gap:4px;margin-bottom:24px}
.qb{height:4px;flex:1;border-radius:9999px;background:rgba(0,0,0,0.06);transition:background .35s}
.qb.d{background:var(--gold)}.qb.c{background:linear-gradient(90deg,var(--gold),rgba(0,0,0,0.06))}
.qn{font-family:var(--f-display);font-size:11px;color:var(--gold);letter-spacing:0.12em;margin-bottom:8px;text-transform:uppercase}
.qt{font-family:var(--f-serif);font-size:20px;line-height:1.65;margin-bottom:24px}
.qo{display:flex;flex-direction:column;gap:10px}
.qopt{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:20px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .3s cubic-bezier(.22,1,.36,1);-webkit-user-select:none;user-select:none;opacity:0;transform:translateY(16px);will-change:opacity,transform;box-shadow:var(--shadow)}
.p.on .qopt{opacity:1;transform:translateY(0)}
.qopt:hover{background:var(--glass-h);border-color:var(--glass-bh);transform:translateY(-1px)}
.qopt:active{transform:scale(.96) translateY(0);transition-duration:.1s}
.qopt .em{font-size:24px;flex-shrink:0;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.qopt.sel .em{transform:scale(1.2)}
.qopt .lb{font-size:13px;color:var(--t2);line-height:1.5;transition:color .3s}
.qopt.sel{background:rgba(209,174,107,.12);border-color:rgba(209,174,107,.35);box-shadow:0 4px 24px rgba(209,174,107,0.1),inset 0 0 0 1px rgba(209,174,107,.08);transform:scale(1.01)}
.qopt.sel .lb{color:var(--gold)}
.qopt.dis{opacity:.3;pointer-events:none}
.multi-hint{font-size:11px;color:var(--t3);margin-top:8px;text-align:center}

/* LOADING — 味觉DNA解码动效 */
#sLoad{justify-content:center;align-items:center;background:var(--bg);text-align:center}
.load-wrap{position:relative;width:140px;height:140px;margin:0 auto 28px}
.spin{position:absolute;top:0;left:0;width:140px;height:140px;border:2px solid rgba(160,133,53,.1);border-top-color:var(--gold);border-radius:50%;animation:sp 1.2s cubic-bezier(.4,0,.2,1) infinite}
.spin-inner{position:absolute;top:16px;left:16px;width:108px;height:108px;border:2px solid rgba(160,133,53,.06);border-bottom-color:rgba(160,133,53,.5);border-radius:50%;animation:sp 1.8s cubic-bezier(.4,0,.2,1) infinite reverse}
.load-icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;animation:loadPulse 1.5s ease-in-out infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@keyframes loadPulse{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(.9)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
.load-text{font-size:13px;color:var(--t3);letter-spacing:3px;animation:loadFade 2s ease-in-out infinite}
.load-dots{display:inline}
.load-dots::after{content:'';animation:dots 1.5s steps(4,end) infinite}
@keyframes dots{0%{content:''}25%{content:'.'}50%{content:'..'}75%{content:'...'}}
@keyframes loadFade{0%,100%{opacity:.3}50%{opacity:.8}}

/* RESULT — 揭晓动效 */
.rc{border-radius:28px;padding:28px 20px;text-align:center;margin-bottom:22px;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);animation:rcReveal .7s cubic-bezier(.22,1,.36,1) both;box-shadow:var(--shadow-lg)}
@keyframes rcReveal{0%{opacity:0;transform:scale(.85) translateY(30px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.rc-edge{background:rgba(138,154,181,.08);border:1px solid rgba(138,154,181,.2)}
.rc-bloom{background:rgba(155,138,224,.08);border:1px solid rgba(155,138,224,.2)}
.rc-easy{background:rgba(176,176,184,.08);border:1px solid rgba(176,176,184,.15)}
.rc-drop{background:rgba(123,90,174,.08);border:1px solid rgba(123,90,174,.2)}

/* PORTRAIT — 揭晓头像 */
.portrait{width:180px;height:180px;border-radius:50%;object-fit:cover;margin:0 auto 14px;display:block;border:3px solid rgba(160,133,53,.2);box-shadow:0 8px 32px rgba(0,0,0,.08);animation:portraitReveal .8s cubic-bezier(.22,1,.36,1) .15s both}
@keyframes portraitReveal{0%{opacity:0;transform:scale(.5) rotate(-8deg);box-shadow:0 0 0 rgba(0,0,0,0)}60%{transform:scale(1.05) rotate(2deg)}100%{opacity:1;transform:scale(1) rotate(0);box-shadow:0 8px 40px rgba(0,0,0,.1)}}
.portrait-sm{width:58px;height:58px;border-radius:50%;object-fit:cover;border:2px solid var(--gold)}
.portrait-xs{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,.3)}
.emoji-fb{font-size:56px;text-align:center;margin-bottom:2px}

.rn{font-family:var(--f-serif);font-size:26px;color:var(--gold);animation:textUp .5s cubic-bezier(.22,1,.36,1) .35s both}
.re{font-size:12px;color:var(--t3);letter-spacing:5px;margin-bottom:10px;animation:textUp .5s cubic-bezier(.22,1,.36,1) .25s both}
.rl{font-size:13px;color:var(--t2);margin-bottom:10px;letter-spacing:2px;animation:textUp .5s cubic-bezier(.22,1,.36,1) .45s both}
.rd{font-size:13px;color:var(--t2);line-height:1.85;text-align:left;animation:textUp .5s cubic-bezier(.22,1,.36,1) .55s both}
.rt{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:14px;animation:textUp .5s cubic-bezier(.22,1,.36,1) .65s both}
.rtg{background:rgba(160,133,53,.08);border:1px solid rgba(160,133,53,.15);border-radius:9999px;padding:4px 12px;font-size:11px;color:var(--gold);transition:transform .2s}
.rtg:active{transform:scale(.95)}
@keyframes textUp{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
.rec{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:20px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin:10px 0 8px;animation:textUp .5s cubic-bezier(.22,1,.36,1) .75s both;box-shadow:var(--shadow)}
.bot{width:38px;height:54px;background:linear-gradient(180deg,rgba(160,133,53,0.2),rgba(160,133,53,0.08));border:1px solid rgba(160,133,53,0.15);border-radius:5px 5px 3px 3px;position:relative;flex-shrink:0}
.bot::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:13px;height:8px;background:rgba(160,133,53,0.3);border-radius:3px 3px 0 0}

/* VOTE — 投票卡片 */
.vc{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:22px;padding:16px 18px;margin-bottom:11px;cursor:pointer;transition:all .35s cubic-bezier(.22,1,.36,1);box-shadow:var(--shadow)}
.vc:hover{background:var(--glass-h);border-color:var(--glass-bh);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.vc:active{transform:scale(.97);transition-duration:.1s}
.vc.vd{border-color:rgba(209,174,107,.35);background:rgba(209,174,107,.1);box-shadow:0 4px 20px rgba(209,174,107,.1);transform:translateY(-1px)}
.vct{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.vck{width:24px;height:24px;border:2px solid rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;flex-shrink:0}
.vc.vd .vck{border-color:var(--gold);background:var(--gold);color:#fff}
.vbg{height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-bottom:5px}
.vbf{height:100%;border-radius:3px;transition:width .7s ease}
.vbg-g{background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.vbg-d{background:rgba(201,168,76,.25)}
.nb{background:rgba(209,174,107,.06);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(209,174,107,.12);border-radius:20px;padding:22px;text-align:center;margin:18px 0;box-shadow:var(--shadow)}

/* PROFILE */
.ph{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.pb{display:inline-flex;align-items:center;gap:4px;background:rgba(160,133,53,.08);border:1px solid rgba(160,133,53,.15);border-radius:9999px;padding:3px 10px;font-size:11px;color:var(--gold);font-family:var(--f-display);margin-top:3px}
.sts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.st{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:18px;padding:14px 6px;text-align:center;box-shadow:var(--shadow)}
.stn{font-family:var(--f-display);font-size:24px;color:var(--gold);font-weight:600}
.stl{font-size:10px;color:var(--t3);margin-top:2px;letter-spacing:0.04em}
.dn{background:var(--glass);border:1px solid var(--glass-b);border-radius:22px;padding:18px;margin-bottom:20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--shadow)}
.dr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.dl{font-size:11px;color:var(--t3);width:32px}
.dt{flex:1;height:5px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.df{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:3px;transition:width .8s ease .3s}
.dv{font-size:11px;color:var(--gold);width:24px;text-align:right}
.stit{font-family:var(--f-display);font-size:11px;color:var(--t3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
.tl{position:relative;padding-left:20px}
.tl::before{content:'';position:absolute;left:4px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold-d),rgba(201,168,76,.04))}
.ti{position:relative;margin-bottom:16px;padding-left:12px}
.ti::before{content:'';position:absolute;left:-20px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--gold);border:2px solid var(--bg)}
.td{font-size:10px;color:var(--t3)}
.tt{font-size:13px;color:var(--t2);margin-top:1px;line-height:1.5}
.fm{font-family:var(--f-serif);font-size:18px;line-height:1.9;color:var(--gold);text-align:center;margin:32px 0;opacity:0;animation:ff 1.2s ease .4s forwards}
@keyframes ff{to{opacity:1}}
.share-row{display:flex;gap:10px;margin-top:16px}
.share-row .btn{flex:1}
.foot{text-align:center;padding:20px;font-size:10px;color:rgba(242,235,222,.15)}

/* === ENHANCED SPLASH === */
/* s0-canvas removed — replaced by global #dropCanvas */
.test-count{font-size:13px;color:rgba(255,255,255,0.65);margin-top:12px;text-shadow:0 1px 6px rgba(0,0,0,0.3);animation:fu .8s ease .9s both}
.test-count b{color:#fff;font-size:16px;text-shadow:0 2px 8px rgba(0,0,0,0.35)}
.tagline{font-size:13px;color:rgba(255,255,255,0.55);letter-spacing:6px;margin-top:24px;text-shadow:0 1px 6px rgba(0,0,0,0.25);animation:fu .8s ease 1.1s both}

/* === RADAR CHART === */
.radar-wrap{width:220px;height:220px;margin:0 auto 16px;position:relative}
.radar-wrap canvas{width:100%;height:100%}

/* === RESULT ENHANCED === */
.quad-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:9999px;font-family:var(--f-display);font-size:12px;font-weight:600;letter-spacing:0.06em;margin-bottom:12px}
.quad-edge{background:rgba(138,154,181,.1);color:#8A9AB5;border:1px solid rgba(138,154,181,.25)}
.quad-bloom{background:rgba(155,138,224,.1);color:#9B8AE0;border:1px solid rgba(155,138,224,.25)}
.quad-easy{background:rgba(176,176,184,.1);color:#B0B0B8;border:1px solid rgba(176,176,184,.2)}
.match-pct{font-family:var(--f-display);font-size:42px;font-weight:700;color:var(--gold);margin:8px 0 4px}
.match-label{font-family:var(--f-display);font-size:11px;color:var(--t3);letter-spacing:0.1em;margin-bottom:14px}
.flavor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.flavor-item{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:16px;padding:10px 12px;text-align:center;box-shadow:var(--shadow)}
.flavor-val{font-family:var(--f-display);font-size:20px;color:var(--gold);font-weight:600}
.flavor-lbl{font-size:10px;color:var(--t3);margin-top:2px}
.reco-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:20px;padding:16px;margin:12px 0;box-shadow:var(--shadow)}
.reco-title{font-family:var(--f-display);font-size:11px;color:var(--t3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
.reco-main{display:flex;align-items:center;gap:12px}
.reco-bottle{width:32px;height:48px;background:linear-gradient(180deg,rgba(160,133,53,0.2),rgba(160,133,53,0.08));border:1px solid rgba(160,133,53,0.15);border-radius:4px 4px 2px 2px;position:relative;flex-shrink:0}
.reco-bottle::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:11px;height:7px;background:rgba(160,133,53,0.3);border-radius:2px 2px 0 0}
.reco-info{flex:1}
.reco-name{font-size:15px;font-weight:600}
.reco-style{font-size:11px;color:var(--t3);margin-top:2px}
.reco-price{font-size:20px;color:var(--gold);font-weight:700}
.explore-hint{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:16px;padding:10px 14px;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:8px;margin-bottom:20px;box-shadow:var(--shadow)}
.explore-hint span{color:var(--gold)}

/* FRESH UPGRADE BANNER */
.upgrade-banner{background:rgba(209,174,107,.06);border:1px dashed rgba(209,174,107,.2);border-radius:20px;padding:18px 16px;text-align:center;margin:14px 0;animation:rpop .5s ease;box-shadow:var(--shadow)}
.upgrade-banner .ub-pct{font-family:var(--f-display);font-size:36px;color:var(--gold);font-weight:700;line-height:1}
.upgrade-banner .ub-label{font-size:12px;color:var(--t3);margin:4px 0 10px}
.upgrade-banner .ub-desc{font-size:13px;color:var(--t2);line-height:1.7;margin-bottom:14px}
.upgrade-banner .btn-upgrade{display:inline-flex;align-items:center;gap:6px;background:rgba(160,133,53,.1);border:1px solid rgba(160,133,53,.2);border-radius:9999px;padding:10px 22px;font-size:14px;color:var(--gold);font-weight:600;cursor:pointer;transition:all .25s;font-family:var(--f-body)}
.upgrade-banner .btn-upgrade:hover{background:rgba(160,133,53,.18)}
.upgrade-banner .btn-upgrade:active{transform:scale(.97)}

/* 对味推荐 SKU GRID */
.duiwei-section{margin:16px 0}
.duiwei-title{font-family:var(--f-display);font-size:11px;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px;text-align:center}
.duiwei-grid{display:flex;flex-direction:column;gap:10px}
.duiwei-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:18px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all .25s;box-shadow:var(--shadow)}
.duiwei-card:hover{background:var(--glass-h);border-color:var(--glass-bh);box-shadow:var(--shadow-lg)}
.duiwei-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.duiwei-icon.di-edge{background:rgba(58,58,68,.08);border:1px solid rgba(58,58,68,.15)}
.duiwei-icon.di-bloom{background:rgba(106,90,205,.08);border:1px solid rgba(106,90,205,.15)}
.duiwei-icon.di-easy{background:rgba(160,160,168,.08);border:1px solid rgba(160,160,168,.15)}
.duiwei-info{flex:1}
.duiwei-name{font-size:14px;font-weight:600;color:var(--t1)}
.duiwei-desc{font-size:11px;color:var(--t3);margin-top:2px}
.duiwei-price{font-size:15px;color:var(--gold);font-weight:700;font-family:var(--f-display)}
.duiwei-match{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:var(--gold);background:rgba(201,168,76,.08);border-radius:9999px;padding:2px 8px;margin-top:4px}

/* 人格分布 */
.persona-dist{margin:12px 0}
.persona-dist .pd-title{font-family:var(--f-display);font-size:11px;color:var(--t3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px;text-align:center}
.persona-dist .pd-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.persona-dist .pd-name{font-size:11px;color:var(--t2);width:44px;text-align:right;flex-shrink:0}
.persona-dist .pd-bar{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.persona-dist .pd-fill{height:100%;border-radius:3px;transition:width .8s ease .2s}
.persona-dist .pd-fill-me{background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.persona-dist .pd-fill-other{background:rgba(0,0,0,.08)}
.persona-dist .pd-num{font-size:10px;color:var(--t3);width:28px;font-family:var(--f-display)}

/* 抖音购买按钮 */
.btn-shop{display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,#FE2C55,#25F4EE);border:none;border-radius:9999px;padding:14px 24px;font-size:15px;color:#fff;font-weight:700;cursor:pointer;width:100%;font-family:var(--f-body);transition:all .25s;text-decoration:none;letter-spacing:0.02em;box-shadow:0 4px 20px rgba(254,44,85,.2)}
.btn-shop:hover{box-shadow:0 6px 28px rgba(254,44,85,.3);transform:translateY(-1px)}
.btn-shop:active{transform:scale(.97)}
.shop-hint{text-align:center;font-size:11px;color:var(--t3);margin-top:6px}

/* === PROFILE ENHANCED === */
.level-bar{height:4px;background:rgba(255,255,255,.08);border-radius:9999px;overflow:hidden;margin:6px 0 4px}
.level-fill{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:9999px;transition:width 1s ease .3s}
.level-info{display:flex;justify-content:space-between;font-size:10px;color:var(--t3)}
.prof-evo-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:20px;padding:14px;margin-bottom:20px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow)}
.prof-evo-arrow{font-size:20px;color:var(--gold);flex-shrink:0}
.prof-evo-text{font-size:12px;color:var(--t2);line-height:1.6}
.prof-evo-text b{color:var(--gold)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:20px}
.stat-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:16px;padding:10px 4px;text-align:center;box-shadow:var(--shadow)}
.stat-val{font-family:var(--f-display);font-size:20px;color:var(--gold);font-weight:600}
.stat-lbl{font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:0.04em}

/* === POSTER OVERLAY (微信长按保存) === */
.poster-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s ease;-webkit-overflow-scrolling:touch;overflow-y:auto;padding:20px 0}
.poster-overlay.show{opacity:1;pointer-events:auto}
.poster-hint{color:var(--gold);font-size:14px;letter-spacing:2px;margin-bottom:16px;animation:hintPulse 2s ease-in-out infinite;text-align:center;padding:0 20px}
@keyframes hintPulse{0%,100%{opacity:.6}50%{opacity:1}}
.poster-img{max-width:88vw;max-height:70vh;border-radius:12px;box-shadow:0 8px 40px rgba(0,0,0,.5);-webkit-touch-callout:default !important}
.poster-close{margin-top:20px;padding:12px 32px;background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-b);border-radius:9999px;color:var(--t2);font-size:14px;cursor:pointer;transition:all .2s}
.poster-close:active{transform:scale(.95);background:var(--glass-h)}
.poster-saving{color:var(--t3);font-size:12px;margin-top:10px}

/* ═══ HOOK MODEL: 徽章系统 ═══ */
.badge-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0}
.badge-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:18px;padding:12px 6px;text-align:center;transition:all .3s;box-shadow:var(--shadow)}
.badge-card.locked{opacity:.35;filter:grayscale(1)}
.badge-card.unlocked{border-color:rgba(209,174,107,.25);background:rgba(209,174,107,.08)}
.badge-card.unlocked.fresh-unlock{animation:badgePop .6s cubic-bezier(.34,1.56,.64,1)}
@keyframes badgePop{0%{transform:scale(.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.badge-icon{font-size:28px;margin-bottom:4px}
.badge-name{font-size:11px;color:var(--t1);font-weight:600}
.badge-desc{font-size:9px;color:var(--t3);margin-top:2px}

/* ═══ HOOK MODEL: 可变优惠券 ═══ */
.coupon-card{background:rgba(209,174,107,.06);border:1.5px dashed rgba(209,174,107,.25);border-radius:20px;padding:18px 16px;text-align:center;margin:14px 0;position:relative;overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.coupon-card::before{content:'';position:absolute;left:-1px;top:50%;width:18px;height:18px;background:var(--bg);border-radius:50%;transform:translateY(-50%)}
.coupon-card::after{content:'';position:absolute;right:-1px;top:50%;width:18px;height:18px;background:var(--bg);border-radius:50%;transform:translateY(-50%)}
.coupon-amount{font-family:var(--f-display);font-size:48px;font-weight:700;color:var(--gold);line-height:1}
.coupon-unit{font-size:14px;color:var(--gold);font-weight:600;vertical-align:super}
.coupon-label{font-size:12px;color:var(--t2);margin:4px 0}
.coupon-timer{display:inline-flex;align-items:center;gap:4px;background:rgba(255,60,60,.1);border:1px solid rgba(255,60,60,.2);border-radius:9999px;padding:4px 12px;font-family:var(--f-display);font-size:12px;color:#ff6b6b;margin-top:8px}
.coupon-timer .ct-dot{width:6px;height:6px;border-radius:50%;background:#ff6b6b;animation:ctBlink 1s ease-in-out infinite}
@keyframes ctBlink{0%,100%{opacity:1}50%{opacity:.3}}

/* ═══ HOOK MODEL: 品鉴评分（Check-in） ═══ */
.checkin-card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:20px;padding:16px;margin:12px 0;box-shadow:var(--shadow)}
.checkin-stars{display:flex;justify-content:center;gap:6px;margin:8px 0}
.checkin-star{font-size:28px;cursor:pointer;opacity:.3;transition:all .2s;transform:scale(.9)}
.checkin-star.lit{opacity:1;transform:scale(1)}
.checkin-star:active{transform:scale(1.3)}
.checkin-done{color:var(--gold);font-size:13px;font-weight:600;text-align:center;animation:badgePop .4s ease}

/* ═══ HOOK MODEL: 社交证明 ═══ */
.social-proof{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.6);margin:8px 0;text-shadow:0 1px 6px rgba(0,0,0,0.25)}
.social-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;animation:ctBlink 2s ease-in-out infinite}
.qopt-pct{font-size:10px;color:var(--t3);margin-left:auto;font-family:var(--f-display);opacity:0;transition:opacity .5s .3s}
.qopt.sel~.qopt .qopt-pct,.qopt.sel .qopt-pct{opacity:1}

/* ═══ 罗盘进化 Compass Evolution ═══ */
.evo-card{background:var(--glass);border:1px solid var(--glass-b);border-radius:20px;padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.evo-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.evo-locked{opacity:.35;position:relative}
.evo-locked::after{content:'🔒 品鉴力不足';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:12px;color:var(--t3);background:var(--bg2);padding:6px 14px;border-radius:8px;white-space:nowrap;box-shadow:var(--shadow)}
.sub-dim{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.sub-dim-bar{flex:1;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.sub-dim-fill{height:100%;border-radius:3px;transition:width .8s ease}
.sub-dim-lbl{font-size:11px;color:var(--t2);min-width:56px}
.sub-dim-val{font-size:11px;color:var(--gold);min-width:28px;text-align:right}
.drift-dot{width:8px;height:8px;border-radius:50%;position:absolute}
.compare-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.tribe-avg-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;margin-right:4px}

/* ═══ 风味罗盘 Flavor Compass — 互动调酒 ═══ */
.compass-canvas-wrap{position:relative;width:min(320px,88vw);height:min(320px,88vw);margin:0 auto;touch-action:none}
.compass-canvas-wrap canvas{width:100%;height:100%;cursor:pointer}
.compass-hint{text-align:center;font-size:11px;color:var(--t3);margin:6px 0 14px;opacity:.7}
.cps-sliders{display:flex;flex-direction:column;gap:10px;width:100%;margin:0 0 16px}
.cps-row{display:flex;align-items:center;gap:8px}
.cps-icon{font-size:18px;width:26px;text-align:center;flex-shrink:0}
.cps-label{font-size:12px;color:var(--t2);width:42px;flex-shrink:0;font-weight:600}
.cps-range{-webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:3px;background:rgba(0,0,0,.08);outline:none}
.cps-range::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;cursor:pointer;background:var(--thumb-bg,var(--gold));border:2px solid rgba(255,255,255,.8);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.cps-val{font-size:13px;color:var(--gold);font-weight:700;width:28px;text-align:right;flex-shrink:0}
.cps-result{background:var(--glass);border:1px solid var(--glass-b);border-radius:16px;padding:20px 16px;text-align:center;margin-top:8px;transition:all .3s}
.cps-beer-name{font-size:28px;font-weight:700;color:var(--t1);font-family:serif;margin-bottom:2px}
.cps-beer-style{font-size:13px;color:var(--t3);margin-bottom:10px}
.cps-beer-desc{font-size:13px;color:var(--t2);line-height:1.6;margin-bottom:14px}
.cps-stats{display:flex;justify-content:center;gap:20px;margin-bottom:14px}
.cps-stat{text-align:center}
.cps-stat-val{font-size:20px;font-weight:700;color:var(--gold)}
.cps-stat-lbl{font-size:10px;color:var(--t3);letter-spacing:1px;margin-top:2px}
.cps-tags{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:14px}
.cps-tag{font-size:11px;padding:4px 10px;border-radius:99px;background:rgba(201,168,76,.08);color:var(--gold);border:1px solid rgba(201,168,76,.15)}
.cps-submit-wrap{margin-top:6px}
.cps-submitted{color:var(--gold);font-size:13px;font-weight:600;padding:12px;animation:hintPulse 2s ease-in-out 1}

/* ═══ BOTTOM TAB BAR ═══ */
.tab-bar{position:fixed;bottom:0;left:0;width:100%;display:flex;align-items:stretch;justify-content:space-around;background:rgba(30,30,40,0.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(209,174,107,0.1);z-index:100;padding:6px 0 calc(6px + env(safe-area-inset-bottom));opacity:0;transform:translateY(100%);transition:opacity .35s ease,transform .35s cubic-bezier(.22,1,.36,1);pointer-events:none;box-shadow:0 -2px 16px rgba(0,0,0,0.3)}
.tab-bar.show{opacity:1;transform:translateY(0);pointer-events:auto}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:6px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:all .25s ease;position:relative}
.tab-item::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%) scaleX(0);width:24px;height:2px;border-radius:1px;background:var(--gold);transition:transform .25s cubic-bezier(.22,1,.36,1)}
.tab-item.active::after{transform:translateX(-50%) scaleX(1)}
.tab-icon{font-size:20px;transition:transform .25s cubic-bezier(.34,1.56,.64,1)}
.tab-item.active .tab-icon{transform:scale(1.15)}
.tab-label{font-size:10px;color:var(--t3);letter-spacing:0.02em;transition:color .25s}
.tab-item.active .tab-label{color:var(--gold);font-weight:600}
.tab-item:active{transform:scale(.92);transition-duration:.1s}

/* When tab bar is visible, add bottom padding to pages */
.has-tabbar .p .pi{padding-bottom:90px}
</style>
</head>
<body>
<div id="app">
<canvas id="dropCanvas"></canvas>

<!-- S0: Splash -->
<div class="p on" id="s0">
<div class="pi" style="display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;z-index:1">
  <div class="logo">共醸</div>
  <div class="logo-s">GÒNNIANG とも</div>
  <div class="logo-jam">JAM · 即兴精酿</div>
  <div class="ring" onclick="go('sGender')"><div class="ring-t">发现你的<br>味觉DNA</div></div>
  <div class="hint">90 秒 · 零门槛 · 发现你是谁</div>
  <div class="test-count" id="testCount"></div>
  <div class="social-proof"><div class="social-dot"></div><span id="liveNow">3 人正在测试</span></div>
  <div class="tagline">像我们这样的人，不靠运气选酒</div>
</div>
</div>

<!-- Gender Selection -->
<div class="p" id="sGender">
<div class="pi" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
  <div style="font-size:11px;color:var(--gold);letter-spacing:4px;margin-bottom:10px">开始之前</div>
  <div class="serif" style="font-size:22px;text-align:center;line-height:1.7">你的味觉人格<br>想以什么形象出现？</div>
  <div class="gw">
    <div class="gc" onclick="pickGender('m',this)">
      <div class="gc-icon">🧔</div>
      <div class="gc-label">他</div>
    </div>
    <div class="gc" onclick="pickGender('f',this)">
      <div class="gc-icon">👩</div>
      <div class="gc-label">她</div>
    </div>
  </div>
  <div style="font-size:11px;color:var(--t3);margin-top:28px">仅影响人格形象展示，不影响测试结果</div>
</div>
</div>

<!-- Tier Selection -->
<div class="p" id="sTier">
<div class="pi" style="display:flex;flex-direction:column;align-items:center;justify-content:center">
  <div style="font-size:11px;color:var(--gold);letter-spacing:4px;margin-bottom:10px">选择你的段位</div>
  <div class="serif" style="font-size:22px;text-align:center;line-height:1.7">你和精酿啤酒<br>是什么关系？</div>
  <div style="display:flex;flex-direction:column;gap:14px;margin-top:28px;width:100%;max-width:320px">
    <div class="gc" style="width:100%;display:flex;align-items:center;gap:16px;padding:20px 22px;border-radius:18px" onclick="pickTier('fresh',this)">
      <div style="font-size:36px">🌱</div>
      <div style="text-align:left"><div class="gc-label" style="font-size:16px;letter-spacing:1px;margin-bottom:4px">完全小白</div><div style="font-size:11px;color:var(--t3)">5题 · 生活直觉 · 不懂也没关系</div></div>
    </div>
    <div class="gc" style="width:100%;display:flex;align-items:center;gap:16px;padding:20px 22px;border-radius:18px" onclick="pickTier('craft',this)">
      <div style="font-size:36px">🍺</div>
      <div style="text-align:left"><div class="gc-label" style="font-size:16px;letter-spacing:1px;margin-bottom:4px">有点经验</div><div style="font-size:11px;color:var(--t3)">8题 · 感官引导 · 凭感觉走</div></div>
    </div>
    <div class="gc" style="width:100%;display:flex;align-items:center;gap:16px;padding:20px 22px;border-radius:18px" onclick="pickTier('nerd',this)">
      <div style="font-size:36px">🧪</div>
      <div style="text-align:left"><div class="gc-label" style="font-size:16px;letter-spacing:1px;margin-bottom:4px">老司机</div><div style="font-size:11px;color:var(--t3)">10题 · 专业术语 · 你说了算</div></div>
    </div>
  </div>
  <div style="font-size:11px;color:var(--t3);margin-top:22px">选错了也没事，不影响结果准确度</div>
</div>
</div>

<!-- S1-S10: Questions (JS rendered, max 10 for NERD) -->
<div class="p" id="s1"></div>
<div class="p" id="s2"></div>
<div class="p" id="s3"></div>
<div class="p" id="s4"></div>
<div class="p" id="s5"></div>
<div class="p" id="s6"></div>
<div class="p" id="s7"></div>
<div class="p" id="s8"></div>
<div class="p" id="s9"></div>
<div class="p" id="s10"></div>

<!-- Loading -->
<div class="p" id="sLoad">
  <div class="load-wrap">
    <div class="spin"></div>
    <div class="spin-inner"></div>

function genUID(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  let r='';for(let i=0;i<8;i++)r+=chars[Math.floor(Math.random()*chars.length)];
  return r;
}
function getTomoUID(){
  const m=document.cookie.match(/tomo_uid=([^;]+)/);
  if(m)return m[1];
  const uid=genUID();
  document.cookie='tomo_uid='+uid+';max-age='+60*60*24*365+';path=/;SameSite=Lax';
  return uid;
}

async function submitToSupabase(persona) {
  // Build answer codes as JSONB (flexible for any tier/question count)
  const qAnswers = {};
  for (let i = 0; i < activeQ.length; i++) {
    const a = ans[i];
    const qid = activeQ[i].id;
    if (a === null || a === undefined) qAnswers[qid] = null;
    else if (Array.isArray(a)) qAnswers[qid] = a.map(j => activeQ[i].o[j].code).join(',');
    else qAnswers[qid] = activeQ[i].o[a].code;
  }

  // Also populate legacy q1-q8 fields for CRAFT (backward compatible)
  const codes = [];
  for (let i = 0; i < 8; i++) {
    if (userTier === 'craft' && i < activeQ.length) {
      const a = ans[i];
      if (a === null || a === undefined) codes.push(null);
      else if (Array.isArray(a)) codes.push(a.map(j => activeQ[i].o[j].code).join(','));
      else codes.push(activeQ[i].o[a].code);
    } else codes.push(null);
  }

  const sc = calcScoresRaw();

  const res = await sbPost('test_results', {
    gender: userGender,
    tier: userTier,
    q1: codes[0], q2: codes[1], q3: codes[2], q4: codes[3],
    q5: codes[4], q6: codes[5], q7: codes[6], q8: codes[7],

    persona_suit: persona.suit,

    user_agent: navigator.userAgent, referrer: document.referrer||null
  });
  if (res && res[0]) { lastTestResultId = res[0].id; loadMyRefCount(); }
}

  if(STATS.testCount<1){el.innerHTML='';return;}
  const allBios=PERSONAS.map(p=>p.bio);
  const maxCount=Math.max(...allBios.map(b=>STATS.personaDist[b]||0),1);
  el.innerHTML=`<div class="pd-title">全球味觉人格分布 · ${STATS.testCount} 人已测试</div>
    ${allBios.map(b=>{
      const c=STATS.personaDist[b]||0;
      const pct=Math.round(c/maxCount*100);
      const isMe=b===myBio;
      return `<div class="pd-row">
        <div class="pd-name"${isMe?' style="color:var(--gold);font-weight:600"':''}>${isMe?'→ ':''} ${b}</div>
        <div class="pd-bar"><div class="pd-fill ${isMe?'pd-fill-me':'pd-fill-other'}" style="width:${pct}%"></div></div>
        <div class="pd-num"${isMe?' style="color:var(--gold)"':''}>${c}</div>
      </div>`;
    }).join('')}`;
}

const TIER_LABELS={fresh:'FRESH · 小白',craft:'CRAFT · 进阶',nerd:'NERD · 老司机'};
const TIER_QS={fresh:Q_FRESH, craft:Q_CRAFT, nerd:Q_NERD};

function pickTier(tier,el){
  userTier=tier;
  activeQ=TIER_QS[tier];
  ans=new Array(activeQ.length).fill(null);
  if(navigator.vibrate)navigator.vibrate(8);
  document.querySelectorAll('#sTier .gc').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  renderQuestions();
  setTimeout(()=>go('s1'),450);
}

function renderQuestions(){
  const total=activeQ.length;
  // Clear all question pages
  for(let i=1;i<=10;i++){
    const el=document.getElementById('s'+i);
    if(el) el.innerHTML='';
  }
  activeQ.forEach((q,qi)=>{
    const el=document.getElementById('s'+(qi+1));
    if(!el) return;
    const barHTML=Array.from({length:total},(_,i)=>`<div class="qb ${i<qi?'d':i===qi?'c':''}"></div>`).join('');
    const multiNote=q.multi?`<div class="multi-hint">可多选，最多 ${q.maxSel} 个</div>`:'';
    const hintHTML=q.hint?`<div style="font-size:11px;color:var(--t3);margin-bottom:16px;text-align:center">${q.hint}</div>`:'';
    el.innerHTML=`<div class="pi">
      <div class="qbar">${barHTML}</div>
      <div class="qn">问题 ${qi+1} / ${total}</div>
      <div class="qt serif">${q.title}</div>
      ${hintHTML}
      <div class="qo" id="qo${qi}">${q.o.map((o,oi)=>`<div class="qopt" data-qi="${qi}" data-oi="${oi}" onclick="pick(${qi},${oi},this)"><span class="em">${o.e}</span><span class="lb">${o.t}</span></div>`).join('')}</div>
      ${multiNote}
    </div>`;
  });
}

// Pre-render CRAFT as default (in case user somehow skips tier)
activeQ=Q_CRAFT;
ans=new Array(8).fill(null);
renderQuestions();

function pick(qi,oi,el){
  const q=activeQ[qi];
  if(navigator.vibrate)navigator.vibrate(8);

  if(q.multi){
    let sel=ans[qi];
    if(!Array.isArray(sel))sel=[];
    const idx=sel.indexOf(oi);
    if(idx>=0){
      sel.splice(idx,1);
      el.classList.remove('sel');
    }else{
      if(sel.length>=q.maxSel){
        const oldest=sel.shift();
        document.querySelector(`#qo${qi} [data-oi="${oldest}"]`).classList.remove('sel');
      }
      sel.push(oi);
      el.classList.add('sel');
    }
    ans[qi]=sel.length?[...sel]:null;
    // Handle "null" type options (e.g. aroma_null) — deselect others
    const isNull=q.o[oi].code.endsWith('_null');
    if(isNull&&sel.includes(oi)){
      sel.forEach(s=>{if(s!==oi)document.querySelector(`#qo${qi} [data-oi="${s}"]`).classList.remove('sel');});
      ans[qi]=[oi];
    }else if(sel.length>0&&sel.some(s=>q.o[s].code.endsWith('_null'))&&!isNull){
      const nullIdx=q.o.findIndex(o=>o.code.endsWith('_null'));
      const ni=sel.indexOf(nullIdx);
      if(ni>=0){sel.splice(ni,1);document.querySelector(`#qo${qi} [data-oi="${nullIdx}"]`).classList.remove('sel');}
      ans[qi]=[...sel];
    }
    if((ans[qi]&&ans[qi].length>=q.maxSel)||isNull){
      setTimeout(()=>advance(qi),600);
    }
  }else{
    ans[qi]=oi;
    el.closest('.qo').querySelectorAll('.qopt').forEach(o=>o.classList.remove('sel'));
    el.classList.add('sel');
    setTimeout(()=>advance(qi),350);
  }
}

function advance(qi){
  if(qi<activeQ.length-1){
    go('s'+(qi+2));
    // 选择后显示社交百分比（Hook: 社交认同）
    setTimeout(()=>addOptionPcts(qi),200);
  }else{
    go('sLoad');
    startLoadTease(); // Hook: 期待感可变奖励预告
    setTimeout(showResult,2200);
  }
}

// ============================================================
//  SCORING ALGORITHM — TOMO v3.0 (三套题，分层权重)
// ============================================================
function getCode(qi){
  const a=ans[qi];
  if(a===null||a===undefined)return[];
  if(Array.isArray(a))return a.map(i=>activeQ[qi].o[i].code);
  return[activeQ[qi].o[a].code];
}
function has(qi,code){return getCode(qi).includes(code);}
function codeAt(qi){const a=ans[qi];if(a===null||a===undefined)return'';return activeQ[qi].o[a].code;}

// CRAFT helper: bitter intensity from C3
function q3val(){
  if(userTier!=='craft')return 0;
  const a=ans[2]; if(a===null)return 0;
  const c=activeQ[2].o[a].code;
  return parseInt(c.replace('bitter_',''))||0;
}

// ============================================================
//  FRESH scoring — 5题，权重×2
// ============================================================
function calcFresh(){
  let sE=0,sB=0,sD=0;
  const W=2; // weight multiplier

  // F1 你平时喝什么
  const f1=codeAt(0);
  if(f1==='sweet_base')sB+=2*W;
  else if(f1==='beer_casual')sD+=1*W;
  else if(f1==='wine_cocktail')sB+=1*W;
  else if(f1==='minimal')sD+=2*W;

  // F2 火锅锅底
  const f2=codeAt(1);
  if(f2==='mild')sB+=2*W;
  else if(f2==='medium')sB+=1*W;
  else if(f2==='intense')sE+=2*W;
  else if(f2==='clean')sD+=2*W;

  // F3 朋友递精酿
  const f3=codeAt(2);
  if(f3==='curious_open')sB+=1*W;
  else if(f3==='cautious')sD+=1*W;
  else if(f3==='analytical')sE+=1*W;
  else if(f3==='sensory_first')sE+=1*W;

  // F4 酒的性格
  const f4=codeAt(3);
  if(f4==='bloom_vibe')sB+=3*W;
  else if(f4==='edge_vibe')sE+=3*W;
  else if(f4==='easy_vibe')sD+=3*W;
  else if(f4==='complex_vibe'){sE+=1*W;sB+=1*W;}

  // F5 独处vs社交
  const f5=codeAt(4);
  if(f5==='solo')sE+=2*W;
  else if(f5==='small_group')sB+=1*W;
  else if(f5==='party')sB+=2*W;
  else if(f5==='flexible')sD+=1*W;

  return{edge:sE,bloom:sB,easy:sD};
}

function calcFreshPersona(){
  const sc=calcFresh();
  const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const primary=sorted[0][0];

  // FRESH simplified persona mapping — broader strokes
  const f4=codeAt(3);
  const f5=codeAt(4);

  if(primary==='edge'){
    if(f4==='complex_vibe')return PERSONAS[2];      // ♠♣ — 好奇型
    if(f5==='solo')return PERSONAS[10];              // ♠♠ — 独处
    return PERSONAS[1];                               // ♠♦ — default edge
  }
  if(primary==='bloom'){
    if(f5==='party')return PERSONAS[4];              // ♥♠ — 社交
    if(f4==='bloom_vibe')return PERSONAS[3];         // ♥♦ — 温柔
    return PERSONAS[5];                               // ♥♣ — 清爽bloom
  }
  if(primary==='easy'){
    if(f4==='easy_vibe')return PERSONAS[6];          // ♦♥ — 轻快
    return PERSONAS[11];                              // ♦♣ — 新手探索
  }
  return PERSONAS[11]; // ♦♣ fallback for FRESH
}

// ============================================================
//  CRAFT scoring — 8题，权重×1 (updated C6=收尾)
// ============================================================
function calcCraft(){
  let sE=0,sB=0,sD=0;

  // C1 Visual
  if(has(0,'visual_dark'))sE+=2;
  else if(has(0,'visual_light'))sD+=2;
  else if(has(0,'visual_medium'))sB+=1;

  // C2 Aroma
  const q2=getCode(1);
  q2.forEach(c=>{
    if(c==='aroma_herbal')sE+=3;
    else if(c==='aroma_fruit')sB+=3;
    else if(c==='aroma_roast'){/* cross with C3 */}
    else if(c==='aroma_alcohol')sE+=1;
    else if(c==='aroma_null')sD+=2;
  });
  if(q2.includes('aroma_roast')){
    if(q3val()>=3)sE+=2;else sD+=1;
  }

  // C3 Bitter intensity
  const bv=q3val();
  if(bv===4)sE+=4;
  else if(bv===3)sE+=3;
  else if(bv===2)sB+=1;
  else if(bv===1)sD+=3;
  else if(bv===5){sD+=4;sE-=3;}

  // C4 Bitter position
  if(has(3,'bitter_pos_throat'))sE+=1;
  else if(has(3,'bitter_pos_side'))sE+=1;
  else if(has(3,'bitter_pos_tip'))sB+=1;
  else if(has(3,'bitter_pos_null'))sD+=1;

  // C5 Aftertaste
  if(has(4,'aftertaste_clean'))sD+=2;
  else if(has(4,'aftertaste_heavy')){
    if(sE>sB&&sE>sD)sE+=2;else sB+=2;
  }
  else if(has(4,'aftertaste_astringent'))sE+=1;
  else if(has(4,'aftertaste_null'))sD+=1;
  if(has(4,'aftertaste_heavy')&&q2.includes('aroma_roast'))sE+=1;

  // C6 Finish (NEW — replaces old Q7 accept)
  if(has(5,'finish_clean'))sD+=2;
  else if(has(5,'finish_sweet'))sB+=2;
  else if(has(5,'finish_warm'))sE+=2;
  else if(has(5,'finish_wave'))sE+=1;

  // C7 Scene
  if(has(6,'scene_solo'))sE+=1;
  else if(has(6,'scene_crowd'))sB+=2;
  else if(has(6,'scene_small'))sB+=1;
  else if(has(6,'scene_null'))sD+=1;

  // C8 Motive
  if(has(7,'motive_taste'))sE+=2;
  else if(has(7,'motive_social'))sB+=1;
  else if(has(7,'motive_feeling'))sB+=1;

  return{edge:sE,bloom:sB,easy:sD};
}

function calcCraftPersona(){
  const sc=calcCraft();
  const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const primary=sorted[0][0];
  const q2=getCode(1);

  // Cross-quadrant specials
  if(primary==='bloom'&&has(5,'finish_sweet')&&!has(7,'motive_social'))return PERSONAS[9]; // ♥♥
  if(primary==='edge'&&has(7,'motive_feeling')&&has(6,'scene_solo'))return PERSONAS[10];    // ♠♠
  if(has(7,'motive_null')&&has(5,'finish_wave'))return PERSONAS[11];                         // ♦♣ (探索型收尾)
  if(has(4,'aftertaste_clean')&&q2.includes('aroma_fruit')&&!has(6,'scene_solo'))return PERSONAS[5]; // ♥♣

  if(primary==='edge'){
    if(q3val()>=3&&has(3,'bitter_pos_throat'))return PERSONAS[0];  // ♠♥
    if(q3val()>=3&&has(3,'bitter_pos_side'))return PERSONAS[1];    // ♠♦
    if(q2.includes('aroma_herbal'))return PERSONAS[2];              // ♠♣
    if(q3val()>=4)return PERSONAS[0];                               // ♠♥
    if(has(6,'scene_solo'))return PERSONAS[10];                      // ♠♠
    if(has(5,'finish_wave'))return PERSONAS[2];                      // ♠♣：波浪收尾=探索型
    return PERSONAS[1];                                              // ♠♦
  }
  if(primary==='bloom'){
    if(has(4,'aftertaste_heavy')||q2.includes('aroma_roast'))return PERSONAS[3]; // ♥♦
    if(has(7,'motive_social')||has(6,'scene_crowd'))return PERSONAS[4];          // ♥♠
    if(has(4,'aftertaste_clean'))return PERSONAS[5];                              // ♥♣
    if(has(5,'finish_wave'))return PERSONAS[4];                                   // ♥♠
    return PERSONAS[3];                                                           // ♥♦
  }
  if(primary==='easy'){
    if(q2.includes('aroma_fruit')&&has(5,'finish_wave'))return PERSONAS[6];      // ♦♥
    if(q2.includes('aroma_roast')&&has(7,'motive_taste'))return PERSONAS[7];     // ♦♠
    if(has(4,'aftertaste_heavy')&&!has(0,'visual_light'))return PERSONAS[8];     // ♦♦
    if(has(5,'finish_sweet')&&(has(4,'aftertaste_heavy')||has(0,'visual_dark')))return PERSONAS[8]; // ♦♦
    if(q2.includes('aroma_null')&&has(7,'motive_taste'))return PERSONAS[7];      // ♦♠
    if(has(6,'scene_solo')&&(has(4,'aftertaste_astringent')||has(7,'motive_taste')))return PERSONAS[7]; // ♦♠
    if(has(5,'finish_clean'))return PERSONAS[6];                                  // ♦♥：干净收尾
    if(has(0,'visual_dark')&&has(4,'aftertaste_astringent'))return PERSONAS[8];  // ♦♦
    return PERSONAS[6];                                                           // ♦♥
  }
  return PERSONAS[6];
}

// ============================================================
//  NERD scoring — 10题，权重×0.8 + 反向验证
// ============================================================
function calcNerd(){
  let sE=0,sB=0,sD=0;
  const W=0.8;

  // N1 风格偏好
  const n1=codeAt(0);
  if(n1==='style_wc')sE+=4*W;
  else if(n1==='style_hazy'){sB+=2*W;sE+=1*W;}
  else if(n1==='style_stout')sE+=3*W;
  else if(n1==='style_sour'){sB+=1*W;sE+=1*W;}

  // N2 酒花维度
  const n2=codeAt(1);
  if(n2==='hop_bitter')sE+=3*W;
  else if(n2==='hop_aroma'){sE+=1*W;sB+=1*W;}
  else if(n2==='hop_fresh')sE+=2*W;
  else if(n2==='malt_first')sB+=2*W;

  // N3 ABV
  const n3=codeAt(2);
  if(n3==='abv_low')sD+=3*W;
  else if(n3==='abv_mid')sD+=1*W;
  else if(n3==='abv_high')sE+=2*W;
  else if(n3==='abv_max')sE+=3*W;

  // N4 盲品
  const n4=codeAt(3);
  if(n4==='blind_style')sE+=1*W;
  else if(n4==='blind_hop')sE+=2*W;
  else if(n4==='blind_brewery')sB+=1*W;
  else if(n4==='blind_skip')sD+=2*W;

  // N5 鄙视链 — 反向验证
  const n5=codeAt(4);
  if(n5==='chain_yes')sE+=1*W;
  else if(n5==='chain_no')sB+=1*W;
  else if(n5==='chain_evolved')sD+=1*W;
  else if(n5==='chain_top')sE+=2*W;

  // N6 酿酒师
  const n6=codeAt(5);
  if(n6==='brewer_creative'){sE+=1*W;sB+=1*W;}
  else if(n6==='brewer_stable')sD+=2*W;
  else if(n6==='brewer_classic')sB+=1*W;
  else if(n6==='brewer_tech')sE+=2*W;

  // N7 评价次数
  const n7=codeAt(6);
  if(n7==='eval_instant')sB+=1*W;
  else if(n7==='eval_full')sD+=1*W;
  else if(n7==='eval_thorough')sE+=1*W;
  else if(n7==='eval_obsessive')sE+=2*W;

  // N8 好喝vs好酒 — 反向验证：可修正N1权重
  const n8=codeAt(7);
  if(n8==='good_same')sB+=1*W;
  else if(n8==='good_diff')sE+=2*W;
  else if(n8==='good_context')sD+=1*W;
  else if(n8==='good_bored')sE+=1*W;
  // 反向验证：如果N8=good_same 但 N1=style_wc，说矛盾 → 减弱edge
  if(n8==='good_same'&&n1==='style_wc'){sE-=1*W;}

  // N9 零糖看法
  const n9=codeAt(8);
  if(n9==='health_positive')sD+=1*W;
  else if(n9==='health_purist')sE+=2*W;
  else if(n9==='health_nuanced')sB+=1*W;
  else if(n9==='health_cynical')sE+=1*W;

  // N10 AI酿酒
  const n10=codeAt(9);
  if(n10==='ai_yes')sD+=1*W;
  else if(n10==='ai_no')sE+=1*W;
  else if(n10==='ai_hybrid')sB+=1*W;
  else if(n10==='ai_whatever')sD+=1*W;

  return{edge:Math.round(sE*10)/10,bloom:Math.round(sB*10)/10,easy:Math.round(sD*10)/10};
}

function calcNerdPersona(){
  const sc=calcNerd();
  const sorted=Object.entries(sc).sort((a,b)=>b[1]-a[1]);
  const primary=sorted[0][0];
  const n1=codeAt(0);

  if(primary==='edge'){
    if(n1==='style_wc'&&codeAt(1)==='hop_bitter')return PERSONAS[0];   // ♠♥：WC+苦度
    if(n1==='style_wc')return PERSONAS[1];                              // ♠♦：WC general
    if(n1==='style_stout')return PERSONAS[10];                          // ♠♠：帝国世涛
    if(codeAt(1)==='hop_aroma'||codeAt(1)==='hop_fresh')return PERSONAS[2]; // ♠♣：嗅觉型
    if(codeAt(4)==='chain_top')return PERSONAS[0];                      // ♠♥：自称链顶
    return PERSONAS[1];                                                  // ♠♦
  }
  if(primary==='bloom'){
    if(n1==='style_hazy')return PERSONAS[3];                            // ♥♦：Hazy
    if(codeAt(5)==='brewer_creative')return PERSONAS[4];                // ♥♠：创意
    if(n1==='style_sour')return PERSONAS[5];                            // ♥♣：酸啤
    if(codeAt(1)==='malt_first')return PERSONAS[9];                     // ♥♥：麦芽派
    return PERSONAS[3];                                                  // ♥♦
  }
  if(primary==='easy'){
    if(codeAt(2)==='abv_low')return PERSONAS[6];                        // ♦♥：session
    if(codeAt(5)==='brewer_stable')return PERSONAS[8];                  // ♦♦：稳定性
    if(codeAt(7)==='good_diff')return PERSONAS[7];                      // ♦♠：好酒≠好喝
    if(codeAt(3)==='blind_skip')return PERSONAS[11];                    // ♦♣：不盲品=轻松型
    return PERSONAS[6];                                                  // ♦♥
  }
  return PERSONAS[6];
}

// ============================================================
//  UNIFIED DISPATCHER
// ============================================================
function calcPersona(){
  if(userTier==='fresh')return calcFreshPersona();
  if(userTier==='nerd')return calcNerdPersona();
  return calcCraftPersona(); // default
}

function calcScoresRaw(){
  if(userTier==='fresh')return calcFresh();
  if(userTier==='nerd')return calcNerd();
  return calcCraft();
}

// ── 罗盘进化 1: 子维度解锁 ──
const SUB_DIMS={
  bitter:[{name:'花苦',key:'hopBitter'},{name:'焦苦',key:'roastBitter'},{name:'药草苦',key:'herbBitter'}],
  sweet:[{name:'蜜甜',key:'honey'},{name:'焦糖甜',key:'caramel'},{name:'果甜',key:'fruitSweet'}],
  crisp:[{name:'碳酸感',key:'carbonation'},{name:'干净度',key:'clean'},{name:'收口',key:'finish'}],
  complex:[{name:'酯香',key:'ester'},{name:'酚香',key:'phenol'},{name:'陈年感',key:'aged'}]
};
const DIM_KEYS=['bitter','sweet','crisp','complex'];

function calcSubDims(bars){
  // 从主维度值推演子维度（带伪随机偏移让每人不同）
  const uid=parseInt((localStorage.getItem('tomo_uid')||'0').replace(/\D/g,'').slice(-4)||'1234');
  const sub={};
  DIM_KEYS.forEach((dk,di)=>{
    const base=bars[di];
    sub[dk]=SUB_DIMS[dk].map((s,si)=>{
      const seed=(uid*7+di*13+si*31)%100;
      const offset=Math.round((seed-50)*0.3);
      return {name:s.name, val:Math.max(5,Math.min(100,base+offset))};
    });
  });
  return sub;
}

function renderSubDimCard(bars,pjScore,containerId){
  const el=document.getElementById(containerId);if(!el)return;
  const unlocked=pjScore>=100;
  const sub=calcSubDims(bars);
  const colors=['#6a6aff','#ff7eb3','#87ceeb','#c9a84c'];
  const dimNames=['苦度','甜度','清爽','复杂'];
  el.innerHTML=`

      <div class="evo-title">🔬 味觉细分维度 ${unlocked?'· 已解锁':'· 品鉴力 100 解锁'}</div>

function drawDualRadar(canvasId,bars1,bars2){
  const c=document.getElementById(canvasId);if(!c)return;
  const ctx=c.getContext('2d');
  const w=c.width,h=c.height,cx=w/2,cy=h/2,r=w*0.36;
  const labels=['苦度','甜度','清爽','复杂'];
  const n=4;
  ctx.clearRect(0,0,w,h);
  // 网格
  for(let lv=1;lv<=4;lv++){
    ctx.beginPath();
    const lr=r*lv/4;
    for(let i=0;i<=n;i++){const a=-Math.PI/2+i*2*Math.PI/n;const x=cx+lr*Math.cos(a),y=cy+lr*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.closePath();ctx.strokeStyle='rgba(201,168,76,'+(lv===4?0.2:0.08)+')';ctx.lineWidth=1;ctx.stroke();
  }
  // 数据区域 — 好友(绿)
  ctx.beginPath();
  bars2.forEach((v,i)=>{const a=-Math.PI/2+i*2*Math.PI/n;const vr=r*v/100;const x=cx+vr*Math.cos(a),y=cy+vr*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.closePath();ctx.fillStyle='rgba(74,222,128,0.1)';ctx.fill();ctx.strokeStyle='rgba(74,222,128,0.6)';ctx.lineWidth=2;ctx.stroke();
  // 数据区域 — 自己(金)
  ctx.beginPath();
  bars1.forEach((v,i)=>{const a=-Math.PI/2+i*2*Math.PI/n;const vr=r*v/100;const x=cx+vr*Math.cos(a),y=cy+vr*Math.sin(a);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.closePath();ctx.fillStyle='rgba(201,168,76,0.15)';ctx.fill();ctx.strokeStyle='rgba(201,168,76,0.7)';ctx.lineWidth=2;ctx.stroke();
  // 标签
  ctx.font='22px "Noto Sans SC"';ctx.fillStyle='#888';ctx.textAlign='center';
  const pad=28;
  labels.forEach((l,i)=>{const a=-Math.PI/2+i*2*Math.PI/n;ctx.fillText(l,cx+(r+pad)*Math.cos(a),cy+(r+pad)*Math.sin(a)+7);});
}

function saveDriftSnapshot(bars){
  const history=JSON.parse(localStorage.getItem('tomo_drift')||'[]');
  const today=new Date().toISOString().slice(0,10);
  // 每天最多保存一次
  if(history.length>0 && history[history.length-1].date===today) return;
  history.push({date:today, bars:[...bars]});
  if(history.length>30) history.shift(); // 保留最近30天
  localStorage.setItem('tomo_drift',JSON.stringify(history));
}

async function renderTribeFeed(quad, containerId){
  const el=document.getElementById(containerId);

  // Load recent same-quadrant test results from Supabase
  let feedItems=[];
  try{
    const d=await sbGet('test_results?persona_quad=eq.'+quad+'&order=created_at.desc&limit=10&select=tomo_uid,persona_bio,persona_quad,created_at');
    if(d&&d.length){
      feedItems=d.filter(item=>item.tomo_uid!==TOMO_UID).slice(0,6);
    }
  }catch(e){}

  // Fallback: simulated feed if no real data
  if(feedItems.length===0){
    const bios=PERSONAS.filter(p=>p.quad===quad).map(p=>p.bio);
    const actions=['完成了味觉测试','投票选择了下月口味','分享了味觉DNA卡片','第2次回测味觉','解锁了新徽章'];

      action:actions[i%actions.length],
      created_at:new Date(Date.now()-i*3600000*(1+Math.random()*12)).toISOString()
    }));
  }

  const timeAgo=(iso)=>{
    const ms=Date.now()-new Date(iso).getTime();
    if(ms<3600000) return Math.floor(ms/60000)+'分钟前';
    if(ms<86400000) return Math.floor(ms/3600000)+'小时前';
    return Math.floor(ms/86400000)+'天前';
  };

  el.innerHTML=feedItems.map((item,i)=>`
    <div style="background:var(--glass);border:1px solid var(--glass-b);border-radius:14px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;animation:textUp .4s ease ${i*0.08}s both;box-shadow:var(--shadow)">

          <span style="color:var(--gold);font-weight:500">${item.persona_bio||'族友'}</span>
          <span style="color:var(--t3)"> · ${item.tomo_uid.slice(0,4)}***</span>
        </div>
        <div style="font-size:11px;color:var(--t3);margin-top:2px">${item.action||'加入了族群'}</div>
      </div>
      <div style="font-size:10px;color:var(--t3);flex-shrink:0">${timeAgo(item.created_at)}</div>
    </div>`).join('')+`
    <div style="text-align:center;font-size:11px;color:var(--t3);padding:8px 0">更多族友正在加入...</div>`;

function drawQR(canvasId,text){
  // Use QR Server API to render into canvas
  const c=document.getElementById(canvasId);if(!c)return;
  const ctx=c.getContext('2d');
  const img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
    const pad=12,s=Math.min(c.width,c.height)-pad*2;
    ctx.drawImage(img,pad,pad,s,s);
    // Draw center logo
    const ls=32;
    ctx.fillStyle='#1a1a2e';ctx.fillRect((c.width-ls)/2,(c.height-ls)/2,ls,ls);
    ctx.fillStyle='#c9a84c';ctx.font='bold 14px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('醸',c.width/2,c.height/2);
  };
  img.onerror=function(){
    // Fallback: show text link
    ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle='#1a1a2e';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('扫码加载失败',c.width/2,c.height/2-10);
    ctx.fillText('请复制链接分享',c.width/2,c.height/2+10);
  };
  img.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&margin=0&data='+encodeURIComponent(text);
}
function saveQR(){
  const c=document.getElementById('qrRef');if(!c)return;
  try{
    const link=document.createElement('a');
    link.download='TOMO_推荐码_'+TOMO_UID+'.png';
    link.href=c.toDataURL('image/png');

    w.document.title='长按保存二维码';

}

const TAB_PAGES=['sResult','sVote','sVoted','sCompass','sTribe','sProf'];
var _tabBarVisible=false;

function showTabBar(){
  if(_tabBarVisible)return;
  _tabBarVisible=true;
  document.getElementById('tabBar').classList.add('show');
  document.getElementById('app').classList.add('has-tabbar');
}
function hideTabBar(){
  _tabBarVisible=false;
  document.getElementById('tabBar').classList.remove('show');
  document.getElementById('app').classList.remove('has-tabbar');
}
function updateTabActive(pageId){
  // Map sVoted to sVote tab
  const mapped=pageId==='sVoted'?'sVote':pageId;
  document.querySelectorAll('.tab-item').forEach(t=>{
    t.classList.toggle('active',t.dataset.page===mapped);
  });
}
function tabGo(id){
  // Ensure content is rendered before navigating
  if(id==='sVote') renderVote();
  if(id==='sCompass') renderCompass();
  if(id==='sTribe') renderTribePage();
  if(id==='sProf') renderProf();
  // sResult is already rendered by showResult(), no re-render needed
  go(id);
}

function go(id){
  document.querySelectorAll('.p').forEach(p=>{
    if(p.id===curPage){p.classList.remove('on');p.classList.add('out');setTimeout(()=>p.classList.remove('out'),500);}
  });
  const target=document.getElementById(id);
  if(target){
    target.classList.add('on');target.scrollTop=0;
    // 选项卡片逐个入场动画
    const opts=target.querySelectorAll('.qopt');
    opts.forEach((o,i)=>{
      o.style.transitionDelay=(i*0.06)+'s';
      setTimeout(()=>{o.style.transitionDelay='0s';},500+i*60);
    });
  }
  curPage=id;
  // Show tab bar on app pages, update active tab
  if(TAB_PAGES.includes(id)){
    showTabBar();
    updateTabActive(id);
  }
}
function restart(){

// ============================================================
//  RADAR CHART — canvas 绘制
// ============================================================
function drawRadar(canvasId, bars){
  const c=document.getElementById(canvasId);
  if(!c)return;
  const ctx=c.getContext('2d');
  const w=c.width,h=c.height,cx=w/2,cy=h/2,r=w*0.36;
  const labels=['苦度','甜度','清爽','复杂'];
  const n=4;
  ctx.clearRect(0,0,w,h);

  // 网格
  for(let lv=1;lv<=4;lv++){
    ctx.beginPath();
    const lr=r*lv/4;
    for(let i=0;i<=n;i++){
      const a=-Math.PI/2+i*2*Math.PI/n;
      const x=cx+lr*Math.cos(a),y=cy+lr*Math.sin(a);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(201,168,76,'+(lv===4?0.2:0.08)+')';
    ctx.lineWidth=1;
    ctx.stroke();
  }

  // 轴线
  for(let i=0;i<n;i++){
    const a=-Math.PI/2+i*2*Math.PI/n;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.strokeStyle='rgba(201,168,76,0.1)';
    ctx.stroke();
  }

  // 数据区域
  ctx.beginPath();
  bars.forEach((v,i)=>{
    const a=-Math.PI/2+i*2*Math.PI/n;
    const vr=r*v/100;
    const x=cx+vr*Math.cos(a),y=cy+vr*Math.sin(a);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle='rgba(201,168,76,0.15)';
  ctx.fill();
  ctx.strokeStyle='rgba(201,168,76,0.7)';
  ctx.lineWidth=2;
  ctx.stroke();

  // 数据点
  bars.forEach((v,i)=>{
    const a=-Math.PI/2+i*2*Math.PI/n;
    const vr=r*v/100;
    const x=cx+vr*Math.cos(a),y=cy+vr*Math.sin(a);
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle='#c9a84c';
    ctx.fill();
  });

  // 标签
  ctx.font='22px "Noto Sans SC"';
  ctx.fillStyle='#888';
  ctx.textAlign='center';
  const pad=28;
  labels.forEach((l,i)=>{
    const a=-Math.PI/2+i*2*Math.PI/n;
    const x=cx+(r+pad)*Math.cos(a),y=cy+(r+pad)*Math.sin(a);
    ctx.fillText(l,x,y+7);
  });
}

];

function getBadgeState(p){
  const saved=JSON.parse(localStorage.getItem('tomo_badges')||'[]');
  const result=BADGES.map(b=>{
    const unlocked=b.check(p)||saved.includes(b.id);
    return {...b,unlocked};
  });
  // 保存新解锁的
  const nowUnlocked=result.filter(b=>b.unlocked).map(b=>b.id);
  const freshUnlocks=nowUnlocked.filter(id=>!saved.includes(id));
  if(freshUnlocks.length) localStorage.setItem('tomo_badges',JSON.stringify(nowUnlocked));
  return {badges:result, fresh:freshUnlocks};
}

function renderBadgeGrid(p,containerId){
  const {badges,fresh}=getBadgeState(p);

function generateCoupon(){
  // 可变金额：¥3/¥5/¥8/¥10/¥15，概率加权（中间最常见）
  const pool=[3,3,5,5,5,5,8,8,8,10,10,15];
  const amount=pool[Math.floor(Math.random()*pool.length)];
  const expiry=Date.now()+72*60*60*1000; // 72小时
  const coupon={amount,expiry,id:'C'+Date.now().toString(36)};
  // 存储（不覆盖未过期的）
  const saved=JSON.parse(localStorage.getItem('tomo_coupon')||'null');
  if(!saved||saved.expiry<Date.now()){
    localStorage.setItem('tomo_coupon',JSON.stringify(coupon));
    return coupon;
  }
  return saved;
}

function renderCoupon(containerId){
  const coupon=generateCoupon();
  const el=document.getElementById(containerId);
  if(!el)return;
  const updateTimer=()=>{
    const left=Math.max(0,coupon.expiry-Date.now());
    if(left<=0){el.querySelector('.coupon-timer').innerHTML='<span style="color:#ff6b6b">已过期</span>';return;}
    const h=Math.floor(left/3600000);
    const m=Math.floor((left%3600000)/60000);
    const s=Math.floor((left%60000)/1000);
    const timerEl=el.querySelector('.ct-time');
    if(timerEl)timerEl.textContent=h+'h '+m+'m '+s+'s';
  };
  el.innerHTML=`<div class="coupon-card">
    <div style="font-size:11px;color:var(--t3);letter-spacing:2px;margin-bottom:4px">🎁 TOMO 为你准备了一份味觉礼物</div>
    <div><span class="coupon-unit">¥</span><span class="coupon-amount">${coupon.amount}</span></div>
    <div class="coupon-label">用它体验 TOMO 为你挑的第一杯</div>
    <div class="coupon-timer"><div class="ct-dot"></div><span class="ct-time"></span> 内有效</div>
    <div style="margin-top:10px">
      <a class="btn-shop" style="font-size:14px;padding:12px 20px" href="https://v.douyin.com/gongniang/" target="_blank" rel="noopener">去尝尝 TOMO 的推荐</a>
    </div>

// 选项百分比（基于真实分布模拟）
function addOptionPcts(qi){
  const opts=document.querySelectorAll(`#qo${qi} .qopt`);
  const total=opts.length;
  // 生成随机但合理的百分比
  let pcts=[];
  let sum=0;
  for(let i=0;i<total;i++){const r=10+Math.random()*40;pcts.push(r);sum+=r;}
  pcts=pcts.map(p=>Math.round(p/sum*100));
  // 修正总和为100
  const diff=100-pcts.reduce((a,b)=>a+b,0);
  pcts[0]+=diff;
  opts.forEach((o,i)=>{
    const span=document.createElement('span');
    span.className='qopt-pct';
    span.textContent=pcts[i]+'%';
    o.appendChild(span);
  });
}

const CPS_DIMS=[
  {key:'bitter', name:'苦度', icon:'💀', color:'#6a6aff', tip:'越高越硬核'},
  {key:'hop',    name:'酒花', icon:'🌿', color:'#50c878', tip:'香气爆炸度'},
  {key:'sweet',  name:'甜度', icon:'🍯', color:'#ff7eb3', tip:'甜蜜指数'},
  {key:'fruit',  name:'果味', icon:'🍊', color:'#ffb347', tip:'水果炸弹'},
  {key:'crisp',  name:'清爽', icon:'❄️', color:'#87ceeb', tip:'冰爽利落'},
  {key:'body',   name:'酒体', icon:'🏋', color:'#c9a84c', tip:'厚重饱满度'},
  {key:'sour',   name:'酸度', icon:'🍋', color:'#a8e6cf', tip:'酸爽开胃'},
  {key:'roast',  name:'烘烤', icon:'🔥', color:'#d2691e', tip:'焦香深度'}
];

// 根据滑块值生成酒款
function generateBeer(vals){
  const v=vals;
  // 判断主导风味
  const sorted=CPS_DIMS.map((d,i)=>({key:d.key,val:v[i],i})).sort((a,b)=>b.val-a.val);
  const top1=sorted[0].key, top2=sorted[1].key;

  // ABV：酒体和苦度越高ABV越高
  const abv=Math.max(3.5, Math.min(12, 3.5+(v[0]*0.03)+(v[5]*0.04)+(v[7]*0.02)));

  // 风格匹配
  const styles=[
    {name:'Jam·烈奏',   style:'双倍浑浊 IPA',      fit:v[0]*0.3+v[1]*0.3+v[5]*0.2+v[7]*0.1,           tags:['重口','酒花炸弹','高ABV']},
    {name:'Jam·西风',   style:'西海岸 IPA',         fit:v[0]*0.25+v[1]*0.25+v[4]*0.25+v[5]*0.1,         tags:['干爽','松脂','经典']},
    {name:'Jam·花信',   style:'新英格兰 IPA',       fit:v[1]*0.3+v[3]*0.25+v[2]*0.15+v[5]*0.15,         tags:['浑浊','热带果汁','柔滑']},
    {name:'Jam·蜜浪',   style:'芒果凤梨西打',       fit:v[3]*0.35+v[2]*0.3+v[4]*0.2,                     tags:['水果炸弹','甜蜜','日饮']},
    {name:'Jam·晨雾',   style:'比利时小麦白啤',     fit:v[4]*0.3+v[2]*0.2+v[3]*0.15+(100-v[0])*0.15,    tags:['清爽','柑橘','入门友好']},
    {name:'Jam·黑潮',   style:'燕麦世涛',           fit:v[7]*0.35+v[5]*0.25+v[0]*0.15,                   tags:['咖啡','巧克力','丝滑']},
    {name:'Jam·铁幕',   style:'英式苦啤 ESB',       fit:v[0]*0.2+v[5]*0.2+v[7]*0.2+(100-v[3])*0.1,      tags:['麦芽','经典苦','琥珀']},
    {name:'Jam·白噪',   style:'日式零糖皮尔森',     fit:v[4]*0.35+(100-v[0])*0.2+(100-v[2])*0.15,        tags:['极简','干净','零负担']},
    {name:'Jam·酸旅',   style:'柏林酸小麦',         fit:v[6]*0.4+v[3]*0.2+v[4]*0.15,                     tags:['酸爽','开胃','果味']},
    {name:'Jam·绯语',   style:'草莓杨梅石榴果啤',   fit:v[3]*0.3+v[2]*0.25+v[6]*0.15+(100-v[0])*0.1,    tags:['浆果','微甜','拍照好看']},
    {name:'Jam·深渊',   style:'帝国世涛',           fit:v[7]*0.3+v[0]*0.25+v[5]*0.25,                    tags:['浓黑','烈性','深邃']},
    {name:'Jam·三醸',   style:'比利时三料',         fit:v[5]*0.2+(100-v[0])*0.15+v[2]*0.15+v[1]*0.15,    tags:['修道院','复杂','果酯']}
  ];
  styles.forEach(s=>{ if(isNaN(s.fit))s.fit=0; });
  styles.sort((a,b)=>b.fit-a.fit);
  const best=styles[0];

  // 动态描述
  const flavorWords=[];
  if(v[0]>60) flavorWords.push('硬核苦味');
  else if(v[0]<30) flavorWords.push('柔和顺口');
  if(v[1]>60) flavorWords.push('酒花奔放');
  if(v[2]>60) flavorWords.push('甜蜜诱人');
  if(v[3]>60) flavorWords.push('水果爆发');
  if(v[4]>60) flavorWords.push('冰爽利落');
  if(v[5]>60) flavorWords.push('厚实饱满');
  if(v[6]>60) flavorWords.push('酸爽开胃');
  if(v[7]>60) flavorWords.push('焦香深邃');
  if(flavorWords.length===0) flavorWords.push('平衡均匀');
  const desc='你调出了一款'+flavorWords.slice(0,3).join('、')+'的精酿。'+(best.style)+'，ABV '+abv.toFixed(1)+'%，这是只属于你的味道。';

  return {name:best.name, style:best.style, abv:abv.toFixed(1), tags:best.tags, desc, topFlavors:sorted.slice(0,3).map(s=>CPS_DIMS[s.i].name)};
}

function drawCompassLive(canvasId,vals){
  const c=document.getElementById(canvasId);
  if(!c)return;
  const ctx=c.getContext('2d');
  const w=c.width,h=c.height,cx=w/2,cy=h/2;
  const n=vals.length;
  const r=w*0.33;
  ctx.clearRect(0,0,w,h);

  // 辉光
  const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,r*1.3);
  bg.addColorStop(0,'rgba(201,168,76,0.04)');bg.addColorStop(1,'transparent');
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);

  // 同心环
  for(let lv=1;lv<=4;lv++){
    const lr=r*lv/4;
    ctx.beginPath();
    for(let i=0;i<=n;i++){
      const a=-Math.PI/2+i*2*Math.PI/n;
      ctx.lineTo(cx+lr*Math.cos(a),cy+lr*Math.sin(a));
    }
    ctx.closePath();
    ctx.strokeStyle=lv===4?'rgba(201,168,76,0.2)':'rgba(201,168,76,0.06)';
    ctx.lineWidth=1;ctx.stroke();
  }

  // 轴线
  for(let i=0;i<n;i++){
    const a=-Math.PI/2+i*2*Math.PI/n;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.strokeStyle='rgba(201,168,76,0.08)';ctx.stroke();
  }

  // 数据区域
  ctx.beginPath();
  vals.forEach((v,i)=>{
    const a=-Math.PI/2+i*2*Math.PI/n;
    const vr=r*v/100;
    const x=cx+vr*Math.cos(a),y=cy+vr*Math.sin(a);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();
  const grd=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  grd.addColorStop(0,'rgba(201,168,76,0.3)');grd.addColorStop(1,'rgba(201,168,76,0.05)');
  ctx.fillStyle=grd;ctx.fill();
  ctx.strokeStyle='rgba(201,168,76,0.75)';ctx.lineWidth=2.5;ctx.stroke();

  // 顶点光点
  vals.forEach((v,i)=>{
    const a=-Math.PI/2+i*2*Math.PI/n;
    const vr=r*v/100;
    const x=cx+vr*Math.cos(a),y=cy+vr*Math.sin(a);
    const gl=ctx.createRadialGradient(x,y,0,x,y,10);
    gl.addColorStop(0,CPS_DIMS[i].color+'99');gl.addColorStop(1,'transparent');
    ctx.fillStyle=gl;ctx.fillRect(x-12,y-12,24,24);
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle=CPS_DIMS[i].color;ctx.fill();
  });

  // 标签
  ctx.textAlign='center';ctx.textBaseline='middle';
  const pad=30;
  CPS_DIMS.forEach((d,i)=>{
    const a=-Math.PI/2+i*2*Math.PI/n;
    const lx=cx+(r+pad)*Math.cos(a),ly=cy+(r+pad)*Math.sin(a);
    ctx.font='bold 17px "Noto Sans SC",sans-serif';
    ctx.fillStyle=d.color;
    ctx.fillText(d.icon+' '+d.name,lx,ly);
  });
}

function initParticles(){
  const c=document.getElementById('dropCanvas');
  if(!c)return;
  const ctx=c.getContext('2d');
  const dpr=window.devicePixelRatio||2;
  let W,H;
  function resize(){
    W=window.innerWidth;H=window.innerHeight;
    c.width=W*dpr;c.height=H*dpr;
    c.style.width=W+'px';c.style.height=H+'px';
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  resize();
  window.addEventListener('resize',resize);

  // 水珠类 — 模拟凉啤酒杯凝结水珠
  function makeDrop(ox,oy,or){
    return{
      x:ox!=null?ox:10+Math.random()*(W-20),
      y:oy!=null?oy:Math.random()*H,
      r:or!=null?or:(1.5+Math.random()*3),
      vy:0,sliding:false,
      wait:150+Math.random()*500,
      age:0,speed:0,
      wobble:Math.random()*6.28,
      wobbleSpd:0.008+Math.random()*0.015
    };
  }
  // 初始15颗，散布全屏
  var drops=[];
  for(var i=0;i<15;i++) drops.push(makeDrop());

  function drawDrop(d){
    var x=d.x,y=d.y,r=d.r;
    // 滑落水痕
    if(d.sliding&&d.speed>0.04){
      ctx.beginPath();
      ctx.moveTo(x-r*0.2,y);
      ctx.quadraticCurveTo(x-r*0.1,y-r*3.5,x,y-r*5);
      ctx.quadraticCurveTo(x+r*0.1,y-r*3.5,x+r*0.2,y);
      ctx.fillStyle='rgba(255,255,255,0.05)';
      ctx.fill();
    }
    // 水珠本体 — 径向渐变模拟折射
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(x,y,r,r*0.95,0,0,Math.PI*2);
    var g=ctx.createRadialGradient(x-r*0.3,y-r*0.35,r*0.05,x,y,r);
    g.addColorStop(0,'rgba(255,255,255,0.5)');
    g.addColorStop(0.3,'rgba(255,255,255,0.16)');
    g.addColorStop(0.7,'rgba(255,255,255,0.05)');
    g.addColorStop(1,'rgba(255,255,255,0.02)');
    ctx.fillStyle=g;ctx.fill();
    // 边缘
    ctx.beginPath();
    ctx.ellipse(x,y,r,r*0.95,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=0.5;ctx.stroke();
    // 高光点
    ctx.beginPath();
    ctx.ellipse(x-r*0.28,y-r*0.3,r*0.2,r*0.14,-0.4,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fill();
    ctx.restore();
  }

  var frame=0;
  function loop(){
    ctx.clearRect(0,0,W,H);
    drops.forEach(function(d){
      d.age++;
      d.wobble+=d.wobbleSpd;
      if(!d.sliding){
        if(d.age>d.wait&&d.r>2.2) d.sliding=true;
        return;
      }
      var grav=0.003+d.r*0.002;
      d.speed+=grav;
      d.speed=Math.min(d.speed,0.2+d.r*0.04);
      d.y+=d.speed;
      d.x+=Math.sin(d.wobble)*0.03;
    });
    // 碰撞融合
    for(var i=drops.length-1;i>=0;i--){
      for(var j=i-1;j>=0;j--){
        var a=drops[i],b=drops[j];
        if(!a||!b)continue;
        var dx=a.x-b.x,dy=a.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<a.r+b.r){
          b.r=Math.min(7,Math.sqrt(a.r*a.r+b.r*b.r));
          b.speed=Math.max(a.speed,b.speed);
          b.sliding=true;b.wait=0;
          drops.splice(i,1);break;
        }
      }
    }
    // 回收出界的，补新的
    for(var i=drops.length-1;i>=0;i--){
      if(drops[i].y>H+20){
        drops[i]=makeDrop(null,20+Math.random()*H*0.25,null);
      }
    }
    // 偶尔新增
    if(frame%60===0&&drops.length<18){
      drops.push(makeDrop(null,10+Math.random()*H*0.3,null));
    }
    drops.forEach(drawDrop);
    frame++;
    requestAnimationFrame(loop);
  }
  loop();
}

function drawShareCard(p,portrait,mode){
  const cv=document.createElement('canvas');
  // 降到540px宽（原1080太慢），手机屏幕足够清晰
  const W=540, H=720;
  cv.width=W;cv.height=H;
  const ctx=cv.getContext('2d');
  const cx=W/2;

  // ═══ 背景 ═══
  ctx.fillStyle='#08080f';ctx.fillRect(0,0,W,H);
  const grd=ctx.createRadialGradient(cx,H*0.3,0,cx,H*0.3,W*0.8);
  grd.addColorStop(0,'#18162a');grd.addColorStop(1,'#08080f');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  // ═══ 顶部品牌（紧凑） ═══
  let y=28;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(201,168,76,0.5)';ctx.font='600 14px sans-serif';
  ctx.fillText('TOMO · 共醸',cx,y);
  y+=12;
  ctx.beginPath();ctx.moveTo(cx-60,y);ctx.lineTo(cx+60,y);
  ctx.strokeStyle='rgba(201,168,76,0.15)';ctx.lineWidth=1;ctx.stroke();

  // ═══ 大头像（3倍=半径225→在540宽里用R=150） ═══
  y+=20;
  const avatarR=mode==='social'?160:130;
  const avatarCY=y+avatarR;

  // 光晕
  ctx.beginPath();ctx.arc(cx,avatarCY,avatarR+10,0,Math.PI*2);
  ctx.strokeStyle='rgba(201,168,76,0.06)';ctx.lineWidth=8;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,avatarCY,avatarR+2,0,Math.PI*2);
  ctx.strokeStyle='rgba(201,168,76,0.25)';ctx.lineWidth=2;ctx.stroke();

  if(portrait){
    ctx.save();
    ctx.beginPath();ctx.arc(cx,avatarCY,avatarR,0,Math.PI*2);ctx.closePath();ctx.clip();
    ctx.drawImage(portrait,cx-avatarR,avatarCY-avatarR,avatarR*2,avatarR*2);
    ctx.restore();
  }else{
    ctx.fillStyle='#c9a84c';ctx.font='bold 100px serif';ctx.fillText(p.emoji,cx,avatarCY+35);
  }

  // ═══ 人格名（大字） ═══
  y=avatarCY+avatarR+30;
  ctx.fillStyle='rgba(232,212,139,0.95)';ctx.font='bold 56px serif';
  ctx.fillText(p.bio,cx,y);

  // 花色+专业名
  y+=28;
  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.font='500 20px sans-serif';
  ctx.fillText(p.suit+' · '+p.pro,cx,y);

  // ═══ Motto（大字） ═══
  y+=36;
  ctx.fillStyle='rgba(201,168,76,0.65)';ctx.font='italic 22px serif';
  ctx.fillText(p.motto,cx,y);

  // ═══ 推荐酒款（大字药丸） ═══
  y+=36;
  const recoText='推荐 · '+p.reco+' · '+p.recoP;
  ctx.font='500 18px sans-serif';
  const tw=ctx.measureText(recoText).width;
  const pillW=tw+36,pillH=38,pillX=cx-pillW/2;
  ctx.fillStyle='rgba(201,168,76,0.08)';
  roundRect(ctx,pillX,y-24,pillW,pillH,19);ctx.fill();
  ctx.strokeStyle='rgba(201,168,76,0.2)';ctx.lineWidth=1;
  roundRect(ctx,pillX,y-24,pillW,pillH,19);ctx.stroke();
  ctx.fillStyle='rgba(201,168,76,0.85)';ctx.fillText(recoText,cx,y);

  // ═══ 底部：QR + CTA（紧凑） ═══
  const qrSize=mode==='social'?120:100;
  const qrY=H-qrSize-50;
  const qrX=cx-qrSize/2;

  if(_qrCache.img){
    ctx.drawImage(_qrCache.img,qrX,qrY,qrSize,qrSize);
  }else{
    // QR还没加载完就画占位文字
    ctx.fillStyle='rgba(201,168,76,0.3)';ctx.font='14px sans-serif';
    ctx.fillText('扫码测试你的味觉DNA',cx,qrY+qrSize/2+5);
  }

  // CTA
  ctx.fillStyle='rgba(201,168,76,0.7)';ctx.font='500 16px sans-serif';
  ctx.fillText('扫码发现你的味觉DNA',cx,H-18);

  // 导出
  const dataUrl=cv.toDataURL('image/png');
  showPosterOverlay(dataUrl);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

<!-- 海报浮层（微信长按保存） -->
<div class="poster-overlay" id="posterOverlay" onclick="closePoster(event)">
  <div class="poster-hint">长按图片保存到相册</div>
  <img class="poster-img" id="posterImg" src="" alt="TOMO味觉DNA海报">
  <div class="poster-saving" id="posterSaving"></div>
  <button class="poster-close" onclick="closePoster()">关闭</button>
</div>
<script>
function isWeChat(){return /MicroMessenger/i.test(navigator.userAgent);}
function showPosterOverlay(dataUrl){
  var img=document.getElementById('posterImg');
  img.src=dataUrl;
  var ov=document.getElementById('posterOverlay');
  ov.classList.add('show');
  document.getElementById('posterSaving').textContent=isWeChat()?'在微信中长按图片即可保存':'也可右键 / 长按保存';
  document.body.style.overflow='hidden';
}
function closePoster(e){
  if(e&&e.target.tagName==='IMG')return;
  document.getElementById('posterOverlay').classList.remove('show');
  document.body.style.overflow='';
}
</script>
