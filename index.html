*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'Noto Sans SC',-apple-system,sans-serif;touch-action:manipulation}

.pi{padding:48px 24px 40px;flex:1;width:100%;max-width:420px;margin:0 auto}
.serif{font-family:'Noto Serif SC',serif}

.btn-g{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--gold);font-weight:500}
.btn-g:active{background:rgba(201,168,76,.06)}
.btn-s{padding:12px 20px;font-size:14px;width:auto;border-radius:12px}

.logo-s{font-size:13px;color:var(--t3);letter-spacing:6px;margin:6px 0 10px;animation:fu .8s ease .2s both}
.logo-jam{font-size:14px;color:var(--gold);letter-spacing:3px;opacity:.7;margin-bottom:52px;animation:fu .8s ease .35s both}
@keyframes fu{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:none}}
.ring{width:150px;height:150px;border:2px solid rgba(201,168,76,.25);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;animation:rp 2.5s ease-in-out infinite,fu .8s ease .5s both;transition:transform .15s}
.ring:active{transform:scale(.95)}
@keyframes rp{0%,100%{border-color:rgba(201,168,76,.2);box-shadow:0 0 0 0 rgba(201,168,76,.1)}50%{border-color:rgba(201,168,76,.55);box-shadow:0 0 35px 6px rgba(201,168,76,.06)}}
.ring-t{font-size:17px;color:var(--gold);letter-spacing:3px}
.hint{font-size:12px;color:var(--t3);margin-top:18px;animation:fu .8s ease .7s both}

/* GENDER */
#sGender{background:radial-gradient(ellipse at 50% 40%,#1a1520,var(--bg) 70%)}
.gw{display:flex;gap:24px;justify-content:center;margin-top:36px}
.gc{width:140px;padding:32px 16px 28px;border-radius:22px;background:var(--card);border:2px solid var(--card-b);text-align:center;cursor:pointer;transition:all .25s}
.gc:active{transform:scale(.95)}
.gc.sel{border-color:var(--gold);background:rgba(201,168,76,.08);box-shadow:0 0 20px rgba(201,168,76,.1)}
.gc-icon{font-size:52px;margin-bottom:12px}
.gc-label{font-size:16px;color:var(--t2);letter-spacing:3px;font-weight:500}
.gc.sel .gc-label{color:var(--gold)}

/* QUESTIONS */
.qbar{display:flex;gap:4px;margin-bottom:24px}
.qb{height:4px;flex:1;border-radius:2px;background:#1a1a24;transition:background .35s}
.qb.d{background:var(--gold)}.qb.c{background:linear-gradient(90deg,var(--gold),#333)}
.qn{font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:8px}
.qt{font-family:'Noto Serif SC',serif;font-size:20px;line-height:1.65;margin-bottom:24px}
.qo{display:flex;flex-direction:column;gap:10px}
.qopt{background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;-webkit-user-select:none;user-select:none}

@keyframes sp{to{transform:rotate(360deg)}}

.rc-easy{background:linear-gradient(135deg,rgba(232,232,232,.1),rgba(245,245,247,.05));border:1px solid rgba(232,232,232,.2)}
.rc-drop{background:linear-gradient(135deg,rgba(61,28,110,.25),rgba(26,10,46,.15));border:1px solid rgba(61,28,110,.4)}

.vbg{height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;margin-bottom:5px}
.vbf{height:100%;border-radius:3px;transition:width .7s ease}
.vbg-g{background:linear-gradient(90deg,var(--gold),var(--gold-l))}
.vbg-d{background:rgba(201,168,76,.25)}
.nb{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.18);border-radius:16px;padding:22px;text-align:center;margin:18px 0}

/* PROFILE */
.ph{display:flex;align-items:center;gap:14px;margin-bottom:24px}
.pb{display:inline-flex;align-items:center;gap:4px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:18px;padding:3px 10px;font-size:11px;color:var(--gold);margin-top:3px}

.dr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.dl{font-size:11px;color:var(--t3);width:32px}
.dt{flex:1;height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.df{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:3px;transition:width .8s ease .3s}
.dv{font-size:11px;color:var(--gold);width:24px;text-align:right}
.stit{font-size:12px;color:var(--t3);letter-spacing:2px;margin-bottom:12px}
.tl{position:relative;padding-left:20px}
.tl::before{content:'';position:absolute;left:4px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold),rgba(201,168,76,.06))}
.ti{position:relative;margin-bottom:16px;padding-left:12px}
.ti::before{content:'';position:absolute;left:-20px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--gold);border:2px solid var(--bg)}
.td{font-size:10px;color:var(--t3)}
.tt{font-size:13px;color:var(--t2);margin-top:1px;line-height:1.5}
.fm{font-family:'Noto Serif SC',serif;font-size:18px;line-height:1.9;color:var(--gold);text-align:center;margin:32px 0;opacity:0;animation:ff 1.2s ease .4s forwards}
@keyframes ff{to{opacity:1}}
.share-row{display:flex;gap:10px;margin-top:16px}
.share-row .btn{flex:1}
.foot{text-align:center;padding:20px;font-size:10px;color:#333}

/* === ENHANCED SPLASH === */
#s0-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.test-count{font-size:11px;color:var(--t3);margin-top:12px;animation:fu .8s ease .9s both}
.test-count b{color:var(--gold);font-size:14px}
.tagline{font-size:12px;color:rgba(201,168,76,.5);letter-spacing:6px;margin-top:24px;animation:fu .8s ease 1.1s both}

/* === RADAR CHART === */
.radar-wrap{width:220px;height:220px;margin:0 auto 16px;position:relative}
.radar-wrap canvas{width:100%;height:100%}

/* === RESULT ENHANCED === */
.quad-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;letter-spacing:2px;margin-bottom:12px}

.flavor-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:16px 0}
.flavor-item{background:var(--card);border-radius:12px;padding:10px 12px;text-align:center}
.flavor-val{font-size:20px;color:var(--gold);font-weight:700}
.flavor-lbl{font-size:10px;color:var(--t3);margin-top:2px}
.reco-card{background:linear-gradient(135deg,rgba(201,168,76,.08),rgba(201,168,76,.02));border:1px solid rgba(201,168,76,.15);border-radius:16px;padding:16px;margin:12px 0}
.reco-title{font-size:11px;color:var(--t3);letter-spacing:2px;margin-bottom:8px}
.reco-main{display:flex;align-items:center;gap:12px}
.reco-bottle{width:32px;height:48px;background:linear-gradient(180deg,var(--gold),var(--gold-d));border-radius:4px 4px 2px 2px;position:relative;flex-shrink:0}

.reco-info{flex:1}
.reco-name{font-size:15px;font-weight:600}
.reco-style{font-size:11px;color:var(--t3);margin-top:2px}
.reco-price{font-size:20px;color:var(--gold);font-weight:700}
.explore-hint{background:var(--card);border-radius:12px;padding:10px 14px;font-size:12px;color:var(--t2);display:flex;align-items:center;gap:8px;margin-bottom:20px}

/* === PROFILE ENHANCED === */
.level-bar{height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;margin:6px 0 4px}

.evo-card{background:linear-gradient(135deg,rgba(123,104,238,.08),rgba(201,168,76,.04));border:1px solid rgba(123,104,238,.15);border-radius:16px;padding:14px;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.evo-arrow{font-size:20px;color:var(--gold);flex-shrink:0}
.evo-text{font-size:12px;color:var(--t2);line-height:1.6}
.evo-text b{color:var(--gold)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:20px}
.stat-card{background:var(--card);border-radius:12px;padding:10px 4px;text-align:center}
.stat-val{font-size:20px;color:var(--gold);font-weight:700}

</style>

  const q2c=getCode(1);q2c.forEach(c=>{if(c==='aroma_herbal')sE+=3;else if(c==='aroma_fruit')sB+=3;else if(c==='aroma_alcohol')sE+=1;else if(c==='aroma_null')sD+=2;});
  if(q2c.includes('aroma_roast')){if(q3val()>=3)sE+=2;else sD+=1;}
  const bv=q3val();if(bv===4)sE+=4;else if(bv===3)sE+=3;else if(bv===2)sB+=1;else if(bv===1)sD+=3;else if(bv===5){sD+=4;sE-=3;}
  if(has(3,'bitter_pos_throat'))sE+=1;else if(has(3,'bitter_pos_side'))sE+=1;else if(has(3,'bitter_pos_tip'))sB+=1;else if(has(3,'bitter_pos_null'))sD+=1;
  if(has(4,'aftertaste_clean'))sD+=2;else if(has(4,'aftertaste_heavy')){if(sE>sB&&sE>sD)sE+=2;else sB+=2;}else if(has(4,'aftertaste_astringent'))sE+=1;else if(has(4,'aftertaste_null'))sD+=1;
  if(has(4,'aftertaste_heavy')&&q2c.includes('aroma_roast'))sE+=1;
  if(has(5,'scene_solo'))sE+=1;else if(has(5,'scene_crowd'))sB+=2;else if(has(5,'scene_small'))sB+=1;else if(has(5,'scene_null'))sD+=1;
  if(has(6,'accept_repeat'))sB+=1;else if(has(6,'accept_stop'))sD+=1;
  if(has(7,'motive_taste'))sE+=2;else if(has(7,'motive_social'))sB+=1;else if(has(7,'motive_feeling'))sB+=1;

  const res = await sbPost('test_results', {
    gender: userGender,
    q1: codes[0], q2: codes[1], q3: codes[2], q4: codes[3],
    q5: codes[4], q6: codes[5], q7: codes[6], q8: codes[7],
    persona_id: persona.id, persona_bio: persona.bio,
    persona_pro: persona.pro, persona_quad: persona.quad,
    persona_suit: persona.suit,
    score_edge: sE, score_bloom: sB, score_easy: sD,
    user_agent: navigator.userAgent, referrer: window._referrer||document.referrer||null
  });
  if (res && res[0]) { lastTestResultId = res[0].id; loadMyRefCount(); }
}

Q.forEach((q,qi)=>{
  const el=document.getElementById('s'+(qi+1));
  const barHTML=Array.from({length:8},(_,i)=>`<div class="qb ${i<qi?'d':i===qi?'c':''}"></div>`).join('');
  const multiNote=q.multi?`<div class="multi-hint">可多选，最多 ${q.maxSel} 个</div>`:'';
  el.innerHTML=`<div class="pi">
    <div class="qbar">${barHTML}</div>
    <div class="qn">问题 ${qi+1} / 8</div>
    <div class="qt serif">${q.title}</div>
    <div class="qo" id="qo${qi}">${q.o.map((o,oi)=>`<div class="qopt" data-qi="${qi}" data-oi="${oi}" onclick="pick(${qi},${oi},this)"><span class="em">${o.e}</span><span class="lb">${o.t}</span></div>`).join('')}</div>
    ${multiNote}
  </div>`;
});

function pick(qi,oi,el){
  const q=Q[qi];
  if(navigator.vibrate)navigator.vibrate(8);

  if(q.multi){
    let sel=ans[qi];
    if(!Array.isArray(sel))sel=[];
    const idx=sel.indexOf(oi);
    if(idx>=0){
      sel.splice(idx,1);
      el.classList.remove('sel');
    }else{
      if(sel.length>=q.maxSel){
        const oldest=sel.shift();
        document.querySelector(`#qo${qi} [data-oi="${oldest}"]`).classList.remove('sel');
      }
      sel.push(oi);
      el.classList.add('sel');
    }
    ans[qi]=sel.length?[...sel]:null;
    if(q.o[oi].code==='aroma_null'&&sel.includes(oi)){
      sel.forEach(s=>{if(s!==oi)document.querySelector(`#qo${qi} [data-oi="${s}"]`).classList.remove('sel');});
      ans[qi]=[oi];
    }else if(sel.length>0&&sel.some(s=>q.o[s].code==='aroma_null')&&q.o[oi].code!=='aroma_null'){
      const ni=sel.indexOf(q.o.findIndex(o=>o.code==='aroma_null'));
      if(ni>=0){sel.splice(ni,1);document.querySelector(`#qo${qi} [data-oi="${q.o.findIndex(o=>o.code==='aroma_null')}"]`).classList.remove('sel');}
      ans[qi]=[...sel];
    }
    if((ans[qi]&&ans[qi].length>=q.maxSel)||q.o[oi].code==='aroma_null'){
      setTimeout(()=>advance(qi),600);
    }
  }else{
    ans[qi]=oi;
    el.closest('.qo').querySelectorAll('.qopt').forEach(o=>o.classList.remove('sel'));
    el.classList.add('sel');
    setTimeout(()=>advance(qi),350);
  }
}

// ============================================================
//  SCORING ALGORITHM — TOMO v2.0 (Q4/Q6/Q7参与计分，均衡分布)
// ============================================================
function getCode(qi){
  const a=ans[qi];
  if(a===null||a===undefined)return[];
  if(Array.isArray(a))return a.map(i=>Q[qi].o[i].code);
  return[Q[qi].o[a].code];
}
function has(qi,code){return getCode(qi).includes(code);}
function q3val(){
  const a=ans[2];
  if(a===null)return 0;
  const c=Q[2].o[a].code;
  return parseInt(c.replace('bitter_',''))||0;
}

function calcPersona(){
  let sE=0,sB=0,sD=0;

  // Q1 Visual
  if(has(0,'visual_dark'))sE+=2;
  else if(has(0,'visual_light'))sD+=2;
  else if(has(0,'visual_medium'))sB+=1;

  // Q2 Aroma
  const q2=getCode(1);
  q2.forEach(c=>{
    if(c==='aroma_herbal')sE+=3;
    else if(c==='aroma_fruit')sB+=3;
    else if(c==='aroma_roast'){/* cross with Q3 */}
    else if(c==='aroma_alcohol')sE+=1;
    else if(c==='aroma_null')sD+=2;
  });
  if(q2.includes('aroma_roast')){
    if(q3val()>=3)sE+=2;else sD+=1;
  }

  // Q3 Bitter intensity
  const bv=q3val();
  if(bv===4)sE+=4;
  else if(bv===3)sE+=3;
  else if(bv===2)sB+=1;
  else if(bv===1)sD+=3;
  else if(bv===5){sD+=4;sE-=3;}

  // Q4 Bitter position — 参与计分
  if(has(3,'bitter_pos_throat'))sE+=1;
  else if(has(3,'bitter_pos_side'))sE+=1;
  else if(has(3,'bitter_pos_tip'))sB+=1;
  else if(has(3,'bitter_pos_null'))sD+=1;

  // Q5 Aftertaste
  if(has(4,'aftertaste_clean'))sD+=2;
  else if(has(4,'aftertaste_heavy')){
    if(sE>sB&&sE>sD)sE+=2;else sB+=2;
  }
  else if(has(4,'aftertaste_astringent'))sE+=1;
  else if(has(4,'aftertaste_null'))sD+=1;
  if(has(4,'aftertaste_heavy')&&q2.includes('aroma_roast'))sE+=1;

  // Q6 Scene — 参与计分
  if(has(5,'scene_solo'))sE+=1;
  else if(has(5,'scene_crowd'))sB+=2;
  else if(has(5,'scene_small'))sB+=1;
  else if(has(5,'scene_null'))sD+=1;

  // Q7 Acceptance — 参与计分
  if(has(6,'accept_repeat'))sB+=1;
  else if(has(6,'accept_stop'))sD+=1;

  // Q8 Motive — 扩展
  if(has(7,'motive_taste'))sE+=2;
  else if(has(7,'motive_social'))sB+=1;
  else if(has(7,'motive_feeling'))sB+=1;

  // Step 1: Primary quadrant
  const scores={edge:sE,bloom:sB,easy:sD};
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const primary=sorted[0][0];

  // Step 2: Cross-quadrant specials
  if(primary==='bloom'&&has(6,'accept_repeat')&&!has(7,'motive_social'))return PERSONAS[9]; // 果心
  if(primary==='edge'&&has(7,'motive_feeling')&&has(5,'scene_solo'))return PERSONAS[10];    // 深渊
  if(has(7,'motive_null')&&has(6,'accept_explore'))return PERSONAS[11];                      // 浅渡
  // 花信 跨象限入口：清爽+果香+非独饮
  if(has(4,'aftertaste_clean')&&q2.includes('aroma_fruit')&&!has(5,'scene_solo'))return PERSONAS[5];

  // Step 3: Sub-persona
  if(primary==='edge'){
    if(q3val()>=3&&has(3,'bitter_pos_throat'))return PERSONAS[0];  // 黑锋：苦+喉咙
    if(q3val()>=3&&has(3,'bitter_pos_side'))return PERSONAS[1];    // 铁饮：苦+两侧
    if(q2.includes('aroma_herbal'))return PERSONAS[2];              // 猎浪：草花香 = 嗅觉驱动型
    if(q3val()>=4)return PERSONAS[0];                               // 黑锋：极苦兜底
    if(has(5,'scene_solo'))return PERSONAS[10];                      // 深渊：独饮EDGE
    if(has(6,'accept_explore'))return PERSONAS[2];                   // 猎浪：探索型EDGE
    return PERSONAS[1];                                              // 铁饮
  }
  if(primary==='bloom'){
    if(has(4,'aftertaste_heavy')||q2.includes('aroma_roast'))return PERSONAS[3]; // 蜜语
    if(has(7,'motive_social')||has(5,'scene_crowd'))return PERSONAS[4];          // 甜刺
    if(has(4,'aftertaste_clean'))return PERSONAS[5];                              // 花信
    if(has(6,'accept_explore'))return PERSONAS[4];                                // 甜刺：好奇型BLOOM
    return PERSONAS[3];                                                           // 蜜语
  }
  if(primary==='easy'){
    if(q2.includes('aroma_fruit')&&has(6,'accept_explore'))return PERSONAS[6];   // 清弦
    if(q2.includes('aroma_roast')&&has(7,'motive_taste'))return PERSONAS[7];     // 暗潮
    if(has(4,'aftertaste_heavy')&&!has(0,'visual_light'))return PERSONAS[8];     // 恒频
    if(has(6,'accept_repeat')&&(has(4,'aftertaste_heavy')||has(0,'visual_dark')||has(4,'aftertaste_astringent')))return PERSONAS[8]; // 恒频：习惯+深度信号
    if(q2.includes('aroma_null')&&has(7,'motive_taste'))return PERSONAS[7];      // 暗潮：无嗅觉+味道派
    if(has(5,'scene_solo')&&(has(4,'aftertaste_astringent')||has(7,'motive_taste')))return PERSONAS[7]; // 暗潮：安静研究型
    if(has(6,'accept_repeat'))return PERSONAS[8];                                 // 恒频：习惯型
    if(has(0,'visual_dark')&&has(4,'aftertaste_astringent'))return PERSONAS[8];  // 恒频：深色+涩
    return PERSONAS[6];                                                           // 清弦
  }
  return PERSONAS[6];
}

// ============================================================
//  CALC SCORES (for result page)
// ============================================================
function calcScoresForResult(){
  let sE=0,sB=0,sD=0;
  if(has(0,'visual_dark'))sE+=2;else if(has(0,'visual_light'))sD+=2;else if(has(0,'visual_medium'))sB+=1;
  const q2c=getCode(1);q2c.forEach(c=>{if(c==='aroma_herbal')sE+=3;else if(c==='aroma_fruit')sB+=3;else if(c==='aroma_alcohol')sE+=1;else if(c==='aroma_null')sD+=2;});
  if(q2c.includes('aroma_roast')){if(q3val()>=3)sE+=2;else sD+=1;}
  const bv=q3val();if(bv===4)sE+=4;else if(bv===3)sE+=3;else if(bv===2)sB+=1;else if(bv===1)sD+=3;else if(bv===5){sD+=4;sE-=3;}
  if(has(3,'bitter_pos_throat'))sE+=1;else if(has(3,'bitter_pos_side'))sE+=1;else if(has(3,'bitter_pos_tip'))sB+=1;else if(has(3,'bitter_pos_null'))sD+=1;
  if(has(4,'aftertaste_clean'))sD+=2;else if(has(4,'aftertaste_heavy')){if(sE>sB&&sE>sD)sE+=2;else sB+=2;}else if(has(4,'aftertaste_astringent'))sE+=1;else if(has(4,'aftertaste_null'))sD+=1;
  if(has(4,'aftertaste_heavy')&&q2c.includes('aroma_roast'))sE+=1;
  if(has(5,'scene_solo'))sE+=1;else if(has(5,'scene_crowd'))sB+=2;else if(has(5,'scene_small'))sB+=1;else if(has(5,'scene_null'))sD+=1;
  if(has(6,'accept_repeat'))sB+=1;else if(has(6,'accept_stop'))sD+=1;
  if(has(7,'motive_taste'))sE+=2;else if(has(7,'motive_social'))sB+=1;else if(has(7,'motive_feeling'))sB+=1;
  return {edge:Math.max(0,sE),bloom:Math.max(0,sB),easy:Math.max(0,sD)};
}

// ============================================================
//  RADAR CHART — canvas 绘制
// ============================================================
function drawRadar(canvasId, bars){
  const c=document.getElementById(canvasId);
  if(!c)return;
  const ctx=c.getContext('2d');
  const w=c.width,h=c.height,cx=w/2,cy=h/2,r=w*0.36;
  const labels=['苦度','甜度','清爽','复杂'];
  const n=4;
  ctx.clearRect(0,0,w,h);

  // 网格
  for(let lv=1;lv<=4;lv++){
    ctx.beginPath();
    const lr=r*lv/4;
    for(let i=0;i<=n;i++){
      const a=-Math.PI/2+i*2*Math.PI/n;
      const x=cx+lr*Math.cos(a),y=cy+lr*Math.sin(a);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(201,168,76,'+(lv===4?0.2:0.08)+')';
    ctx.lineWidth=1;
    ctx.stroke();
  }

  // 轴线
  for(let i=0;i<n;i++){
    const a=-Math.PI/2+i*2*Math.PI/n;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));
    ctx.strokeStyle='rgba(201,168,76,0.1)';
    ctx.stroke();
  }

  // 数据区域
  ctx.beginPath();
  bars.forEach((v,i)=>{
    const a=-Math.PI/2+i*2*Math.PI/n;
    const vr=r*v/100;
    const x=cx+vr*Math.cos(a),y=cy+vr*Math.sin(a);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle='rgba(201,168,76,0.15)';
  ctx.fill();
  ctx.strokeStyle='rgba(201,168,76,0.7)';
  ctx.lineWidth=2;
  ctx.stroke();

  // 数据点
  bars.forEach((v,i)=>{
    const a=-Math.PI/2+i*2*Math.PI/n;
    const vr=r*v/100;
    const x=cx+vr*Math.cos(a),y=cy+vr*Math.sin(a);
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle='#c9a84c';
    ctx.fill();
  });

  // 标签
  ctx.font='22px "Noto Sans SC"';
  ctx.fillStyle='#888';
  ctx.textAlign='center';
  const pad=28;
  labels.forEach((l,i)=>{
    const a=-Math.PI/2+i*2*Math.PI/n;
    const x=cx+(r+pad)*Math.cos(a),y=cy+(r+pad)*Math.sin(a);
    ctx.fillText(l,x,y+7);
  });
}

// ============================================================
//  PARTICLE BACKGROUND — 开屏粒子
// ============================================================
function initParticles(){
  const c=document.getElementById('s0-canvas');
  if(!c)return;
  const ctx=c.getContext('2d');
  let w,h;
  function resize(){w=c.width=c.offsetWidth*2;h=c.height=c.offsetHeight*2;}
  resize();
  const pts=Array.from({length:40},()=>({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,r:Math.random()*2+1}));
  function draw(){
    ctx.clearRect(0,0,w,h);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=w;if(p.x>w)p.x=0;if(p.y<0)p.y=h;if(p.y>h)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba(201,168,76,0.15)';ctx.fill();
    });
    // 连线
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<160){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle='rgba(201,168,76,'+(0.06*(1-d/160))+')';ctx.stroke();}
    }
    requestAnimationFrame(draw);
  }
  draw();
}

//  SHARE CARD — 生成分享海报（含头像+玩味描述+二维码+裂变码）

function shareCard(){

  img.onerror=()=>drawShareCard(p,null);

function drawShareCard(p,portrait){
  const cv=document.createElement('canvas');
  cv.width=750;cv.height=1334;
  const ctx=cv.getContext('2d');
  const W=750,H=1334;

  // 背景渐变
  ctx.fillStyle='#0a0a12';ctx.fillRect(0,0,W,H);
  const grd=ctx.createRadialGradient(375,350,0,375,350,500);
  grd.addColorStop(0,'#1a1520');grd.addColorStop(1,'#0a0a12');
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  // 顶部品牌
  ctx.textAlign='center';
  ctx.fillStyle='#c9a84c';ctx.font='900 52px serif';ctx.fillText('共醸',375,90);
  ctx.fillStyle='#555';ctx.font='12px sans-serif';ctx.fillText('GÒNNIANG · JAM即兴精酿',375,120);

  // 分割线
  ctx.beginPath();ctx.moveTo(200,145);ctx.lineTo(550,145);
  ctx.strokeStyle='rgba(201,168,76,0.15)';ctx.lineWidth=1;ctx.stroke();

  // 头像（圆形裁剪）
  const avatarY=260,avatarR=85;
  if(portrait){
    ctx.save();
    ctx.beginPath();ctx.arc(375,avatarY,avatarR,0,Math.PI*2);ctx.closePath();ctx.clip();
    ctx.drawImage(portrait,375-avatarR,avatarY-avatarR,avatarR*2,avatarR*2);
    ctx.restore();
  }
  // 头像边框
  ctx.beginPath();ctx.arc(375,avatarY,avatarR+2,0,Math.PI*2);
  ctx.strokeStyle='rgba(201,168,76,0.35)';ctx.lineWidth=3;ctx.stroke();
  // 光晕
  ctx.beginPath();ctx.arc(375,avatarY,avatarR+12,0,Math.PI*2);
  ctx.strokeStyle='rgba(201,168,76,0.06)';ctx.lineWidth=8;ctx.stroke();

  // 如果没头像显示 emoji
  if(!portrait){
    ctx.fillStyle='#c9a84c';ctx.font='72px serif';ctx.fillText(p.emoji,375,avatarY+24);
  }

  // 人格名
  ctx.fillStyle='#c9a84c';ctx.font='900 44px serif';ctx.fillText(p.bio,375,395);
  ctx.fillStyle='#888';ctx.font='500 15px sans-serif';ctx.fillText(p.suit+' · '+p.pro,375,425);

  // motto
  ctx.fillStyle='rgba(201,168,76,0.7)';ctx.font='italic 16px serif';ctx.fillText(p.motto,375,465);

  // 玩味描述（大字居中）
  ctx.fillStyle='#ddd';ctx.font='500 20px sans-serif';
  const funLines=(p.funLine||'').match(/.{1,18}/g)||[p.funLine];
  funLines.forEach((l,i)=>ctx.fillText(l,375,520+i*32));

  // 分割线
  const divY=520+funLines.length*32+25;
  ctx.beginPath();ctx.moveTo(250,divY);ctx.lineTo(500,divY);
  ctx.strokeStyle='rgba(201,168,76,0.1)';ctx.stroke();

  // 描述文字
  ctx.fillStyle='#999';ctx.font='14px sans-serif';ctx.textAlign='center';
  const descLines=p.desc.match(/.{1,26}/g)||[];
  descLines.forEach((l,i)=>{if(i<5)ctx.fillText(l,375,divY+35+i*24);});

  // 推荐酒款
  const recoY=divY+35+Math.min(descLines.length,5)*24+30;
  ctx.fillStyle='rgba(201,168,76,0.08)';
  roundRect(ctx,100,recoY,550,60,12);ctx.fill();
  ctx.strokeStyle='rgba(201,168,76,0.15)';roundRect(ctx,100,recoY,550,60,12);ctx.stroke();
  ctx.fillStyle='#c9a84c';ctx.font='600 15px sans-serif';ctx.textAlign='left';
  ctx.fillText('推荐 · '+p.reco,130,recoY+26);
  ctx.fillStyle='#666';ctx.font='12px sans-serif';ctx.fillText(p.recoS,130,recoY+46);
  ctx.fillStyle='#c9a84c';ctx.font='700 22px sans-serif';ctx.textAlign='right';
  ctx.fillText(p.recoP,620,recoY+38);

  // 二维码区域
  const qrY=recoY+90;
  ctx.textAlign='center';
  // 绘制简约二维码占位框 + 文字
  ctx.strokeStyle='rgba(201,168,76,0.2)';ctx.lineWidth=2;
  roundRect(ctx,285,qrY,180,180,16);ctx.stroke();
  // QR code：用API生成
  const qrImg=new Image();
  qrImg.crossOrigin='anonymous';
  qrImg.onload=()=>{
    ctx.drawImage(qrImg,295,qrY+10,160,160);
    finishCard(ctx,cv,p,qrY);
  };
  qrImg.onerror=()=>{
    ctx.fillStyle='#333';ctx.font='13px sans-serif';ctx.fillText('扫码测试',375,qrY+95);
    finishCard(ctx,cv,p,qrY);
  };
  const refCode=getMyRefCode();
  qrImg.src='https://api.qrserver.com/v1/create-qr-code/?size=160x160&color=c9a84c&bgcolor=0a0a12&data='+encodeURIComponent('https://joychan777777.github.io/tomo-taste/?ref='+refCode);
}

function finishCard(ctx,cv,p,qrY){
  ctx.textAlign='center';
  ctx.fillStyle='#c9a84c';ctx.font='500 14px sans-serif';
  ctx.fillText('扫码发现你的味觉DNA',375,qrY+205);
  ctx.fillStyle='#444';ctx.font='11px sans-serif';
  ctx.fillText('共醸 GÒNNIANG · 用味觉投票你想喝的下一杯',375,qrY+235);

  // 裂变统计
  const refCount=window._myRefCount||0;
  if(refCount>0){
    ctx.fillStyle='rgba(201,168,76,0.6)';ctx.font='12px sans-serif';
    ctx.fillText('已有 '+refCount+' 人通过我的链接发现味觉DNA',375,qrY+265);
  }

  // 下载
  cv.toBlob(blob=>{
    if(!blob)return;
    const url=URL.createObjectURL(blob);
    // 移动端尝试分享，桌面端下载
    if(navigator.share&&navigator.canShare){
      const file=new File([blob],'TOMO_'+p.bio+'_味觉DNA.png',{type:'image/png'});
      if(navigator.canShare({files:[file]})){
        navigator.share({files:[file],title:'我的味觉DNA · '+p.bio}).catch(()=>downloadBlob(url,p));
        return;
      }
    }
    downloadBlob(url,p);
  });
}

function downloadBlob(url,p){
  const a=document.createElement('a');a.href=url;a.download='TOMO_'+p.bio+'_味觉DNA.png';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

// ============================================================
//  REFERRAL TRACKING — 裂变追踪
// ============================================================
function getMyRefCode(){
  // 用 lastTestResultId 或随机生成
  if(lastTestResultId)return lastTestResultId.substring(0,8);
  if(!window._myRef)window._myRef=Math.random().toString(36).substring(2,10);
  return window._myRef;
}

function trackReferral(){
  const params=new URLSearchParams(window.location.search);
  const ref=params.get('ref');
  if(ref){
    // 记录来源
    window._referrer=ref;
    // 清理 URL（不影响用户体验）
    if(window.history.replaceState){
      window.history.replaceState({},'',window.location.pathname);
    }
  }
}

async function loadMyRefCount(){
  if(!lastTestResultId)return;
  const refCode=lastTestResultId.substring(0,8);
  try{
    const r=await fetch(SB_URL+'/test_results?referrer=like.*'+refCode+'*&select=id',
      {headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
    const d=await r.json();
    if(d&&d.length)window._myRefCount=d.length;
  }catch(e){}
}

trackReferral();

initParticles();
loadTestCount();
