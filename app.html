<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TOMO · 共醸小程序模拟</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
:root{
  /* 品牌金 */
  --gold:#c9a84c;--gold-l:#e8d48b;--gold-d:#8b6914;
  --gold-glow:rgba(201,168,76,0.15);--gold-subtle:rgba(201,168,76,0.08);
  /* 磨砂黑背景层级 */
  --bg:#08080f;--bg2:#0d0d16;--bg3:#12121e;--bg4:#1a1a2a;
  /* 玻璃磨砂层 */
  --glass:rgba(255,255,255,0.04);--glass-h:rgba(255,255,255,0.07);
  --glass-b:rgba(255,255,255,0.08);--glass-bh:rgba(255,255,255,0.14);
  --card:rgba(255,255,255,0.04);--card-b:rgba(255,255,255,0.08);
  /* 文字层级 */
  --t1:rgba(255,255,255,0.92);--t2:rgba(255,255,255,0.56);--t3:rgba(255,255,255,0.32);--t4:rgba(255,255,255,0.16);
  /* 象限色 */
  --edge:#2C2C34;--bloom:#7B68EE;--easy:#E8E8E8;--drop:#3D1C6E;
  /* 功能色 */
  --green:#34d399;--red:#f87171;--blue:#4a9eff;--purple:#a78bfa;
  /* 字体 */
  --f-display:'Space Grotesk','Noto Sans SC',sans-serif;
  --f-body:'Inter','Noto Sans SC',-apple-system,sans-serif;
  --f-serif:'Noto Serif SC',serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:var(--f-body);touch-action:manipulation;-webkit-font-smoothing:antialiased}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative}
.serif{font-family:var(--f-serif)}
.display{font-family:var(--f-display)}

/* === TAB BAR === */
.tabs{display:flex;background:rgba(13,13,22,0.72);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid var(--glass-b);padding:8px 0 max(8px, env(safe-area-inset-bottom));flex-shrink:0;position:fixed;bottom:0;left:0;right:0;z-index:10}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;transition:color .2s;color:var(--t3)}
.tab.on{color:var(--gold)}
.tab .ico{font-size:22px}
.tab .tl{font-size:10px;letter-spacing:1px}

/* === PAGES === */
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:0 0 80px}
.page.on{display:block}
.ph{padding:16px 20px}
.section{padding:0 20px 16px}

/* === HEADER === */
.hdr{background:linear-gradient(180deg,rgba(201,168,76,.06),transparent);padding:max(54px, calc(env(safe-area-inset-top) + 16px)) 20px 16px;text-align:center;position:relative}
.hdr::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:300px;height:200px;background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);pointer-events:none}
.hdr h1{font-family:var(--f-display);font-size:20px;color:var(--gold);font-weight:600;letter-spacing:0.05em;position:relative}
.hdr .sub{font-size:11px;color:var(--t3);margin-top:4px;letter-spacing:0.04em;position:relative}

/* === CARDS === */
.card{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:16px;padding:16px;margin-bottom:12px;transition:all 0.2s ease}
.card:hover{background:var(--glass-h);border-color:var(--glass-bh)}
.card-gold{background:rgba(201,168,76,.05);border-color:rgba(201,168,76,.2)}
.card-gold:hover{border-color:rgba(201,168,76,.35);box-shadow:0 8px 32px rgba(201,168,76,0.06)}
.card-title{font-family:var(--f-display);font-size:11px;color:var(--t3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.card-val{font-family:var(--f-display);font-size:28px;color:var(--gold);font-weight:600}

/* === BUTTONS === */
.btn{display:flex;align-items:center;justify-content:center;background:var(--gold);border:none;border-radius:9999px;padding:14px 24px;font-size:14px;color:#08080f;font-weight:600;letter-spacing:0.02em;cursor:pointer;width:100%;font-family:var(--f-body);transition:all .25s ease}
.btn:hover{background:var(--gold-l);box-shadow:0 4px 20px var(--gold-glow)}
.btn:active{transform:scale(.97)}
.btn-g{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-b);color:var(--t1);font-weight:500}
.btn-g:hover{background:var(--glass-h);border-color:var(--glass-bh)}
.btn-sm{padding:10px 20px;font-size:13px;border-radius:9999px;width:auto}
.btn-dis{opacity:.3;pointer-events:none}

/* === CHECKIN === */
.checkin-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:12px 0}
.ck-day{aspect-ratio:1;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--t3);background:var(--glass);border:1px solid var(--glass-b);transition:all .25s}
.ck-day.done{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.2);color:var(--gold-l)}
.ck-day.today{border-color:var(--gold);color:var(--t1)}
.ck-day .ck-n{font-size:14px;font-weight:700}

/* === HOPS === */
.hops-badge{display:inline-flex;align-items:center;gap:5px;background:var(--gold-subtle);border:1px solid rgba(201,168,76,.2);border-radius:9999px;padding:4px 12px;font-size:13px;color:var(--gold-l);font-family:var(--f-display)}
.hops-log{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.hops-log:last-child{border:none}

/* === REPUTATION === */
.rep-bar{height:4px;background:rgba(255,255,255,.04);border-radius:9999px;overflow:hidden;margin:6px 0 2px}
.rep-fill{height:100%;background:linear-gradient(90deg,var(--gold-d),var(--gold));border-radius:9999px;transition:width .8s ease}

/* === VOTE === */
.vote-card{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-b);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .25s}
.vote-card:hover{background:var(--glass-h);border-color:var(--glass-bh)}
.vote-card.sel{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.06)}
.vote-bar{height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;margin-top:8px}
.vote-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* === SLIDER === */
.slider-wrap{margin:16px 0}
.slider-label{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:6px}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:9999px;background:rgba(255,255,255,.04);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 16px var(--gold-glow);border:2px solid var(--gold-l)}

/* === BLIND === */
.blind-cup{flex:1;background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-b);border-radius:20px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .25s}
.blind-cup:hover{background:var(--glass-h);border-color:var(--glass-bh)}
.blind-cup.sel{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.06);box-shadow:0 4px 20px rgba(201,168,76,0.06)}
.blind-cup:active{transform:scale(.97)}
.blind-vs{display:flex;gap:12px;margin:16px 0}

/* === PROFILE === */
.avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,rgba(201,168,76,0.15),rgba(201,168,76,0.05));display:flex;align-items:center;justify-content:center;font-size:30px;border:2px solid rgba(201,168,76,0.3);flex-shrink:0;box-shadow:0 0 24px rgba(201,168,76,0.08)}
.level-badge{display:inline-flex;align-items:center;gap:4px;background:var(--gold-subtle);border:1px solid rgba(201,168,76,.2);border-radius:9999px;padding:3px 10px;font-size:11px;color:var(--gold-l);font-family:var(--f-display)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
.stat{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-b);border-radius:12px;padding:12px 6px;text-align:center}
.stat-n{font-family:var(--f-display);font-size:22px;color:var(--gold);font-weight:600}
.stat-l{font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:0.04em}

/* === RADAR === */
.radar-wrap{display:flex;justify-content:center;margin:12px 0}

/* === TIMELINE === */
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:4px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold-d),rgba(201,168,76,.04))}
.tl-item{position:relative;margin-bottom:14px;padding-left:14px}
.tl-item::before{content:'';position:absolute;left:-20px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--gold);border:2px solid var(--bg)}
.tl-date{font-size:10px;color:var(--t3)}
.tl-text{font-size:12px;color:var(--t2);margin-top:1px;line-height:1.5}

/* === MOOD === */
.mood-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}
.mood-opt{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-b);border-radius:16px;padding:16px;text-align:center;cursor:pointer;transition:all .25s}
.mood-opt:hover{background:var(--glass-h);border-color:var(--glass-bh)}
.mood-opt:active{transform:scale(.97)}
.mood-opt.sel{border-color:rgba(201,168,76,.3);background:rgba(201,168,76,.06)}
.mood-em{font-size:32px;margin-bottom:6px}
.mood-t{font-size:12px;color:var(--t2)}

/* === TOAST === */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(8,8,15,0.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:24px 32px;text-align:center;z-index:100;opacity:0;pointer-events:none;transition:all .3s}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.toast-em{font-size:40px;margin-bottom:8px}
.toast-t{font-family:var(--f-display);font-size:15px;color:var(--gold-l);font-weight:600}
.toast-s{font-size:12px;color:var(--t2);margin-top:4px}

/* === SCORE === */
.score-card{display:flex;align-items:center;gap:14px;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.15);border-radius:16px;padding:14px 16px;margin-bottom:12px}

/* === SKU LIST === */
.sku{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sku:last-child{border:none}
.sku-bottle{width:36px;height:52px;background:linear-gradient(180deg,rgba(201,168,76,0.3),rgba(201,168,76,0.1));border:1px solid rgba(201,168,76,0.2);border-radius:5px 5px 3px 3px;position:relative;flex-shrink:0}
.sku-bottle::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:12px;height:7px;background:rgba(201,168,76,0.4);border-radius:3px 3px 0 0}
.sku-info{flex:1}
.sku-name{font-size:14px;font-weight:500}
.sku-desc{font-size:11px;color:var(--t3);margin-top:2px}
.sku-price{font-size:18px;color:var(--gold);font-weight:700}

/* notify dot */
.dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:4px;right:calc(50% - 16px)}

/* === TEST QUESTIONS === */
.qbar{display:flex;gap:4px;margin-bottom:24px}
.qb{height:4px;flex:1;border-radius:9999px;background:rgba(255,255,255,0.04);transition:background .35s}
.qb.d{background:var(--gold)}.qb.c{background:linear-gradient(90deg,var(--gold),rgba(255,255,255,0.06))}
.qn{font-family:var(--f-display);font-size:11px;color:var(--gold);letter-spacing:0.12em;margin-bottom:8px;text-transform:uppercase}
.qt{font-family:var(--f-serif);font-size:20px;line-height:1.65;margin-bottom:24px}
.qo{display:flex;flex-direction:column;gap:10px}
.qopt{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-b);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .25s;-webkit-user-select:none;user-select:none}
.qopt:hover{background:var(--glass-h);border-color:var(--glass-bh)}
.qopt:active{transform:scale(.98)}
.qopt .em{font-size:24px;flex-shrink:0}
.qopt .lb{font-size:13px;color:var(--t2);line-height:1.5}
.qopt.sel{background:rgba(201,168,76,.08);border-color:rgba(201,168,76,.3);box-shadow:0 4px 16px rgba(201,168,76,0.06)}
.qopt.sel .lb{color:var(--gold-l)}

/* === TEST RESULT CARD === */
.rc{background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-b);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:16px}
.rc-edge{border-color:rgba(44,44,52,.5);background:linear-gradient(160deg,rgba(44,44,52,.15),rgba(0,0,0,.1))}
.rc-bloom{border-color:rgba(123,104,238,.2);background:linear-gradient(160deg,rgba(123,104,238,.06),rgba(0,0,0,.1))}
.rc-easy{border-color:rgba(232,232,232,.15);background:linear-gradient(160deg,rgba(232,232,232,.04),rgba(0,0,0,.1))}
.rc-drop{border-color:rgba(61,28,110,.3);background:linear-gradient(160deg,rgba(61,28,110,.1),rgba(0,0,0,.1))}
.rs{font-size:52px;margin-bottom:10px}
.rn{font-family:var(--f-serif);font-size:28px;font-weight:700;color:var(--gold-l);margin-bottom:4px}
.re{font-size:13px;color:var(--t3);letter-spacing:2px;margin-bottom:6px}
.rt{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}
.rtg{background:var(--gold-subtle);border:1px solid rgba(201,168,76,.2);border-radius:9999px;padding:4px 12px;font-size:11px;color:var(--gold-l);font-family:var(--f-body)}
@keyframes rpop{0%{opacity:0;transform:scale(.85) translateY(20px)}100%{opacity:1;transform:none}}

/* === PORTRAIT === */
.portrait{width:160px;height:160px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block;border:3px solid rgba(201,168,76,.2);box-shadow:0 0 40px rgba(201,168,76,.1)}
.emoji-fb{font-size:52px;margin-bottom:10px}
</style>
</head>

// ============================================================
//  TAB NAVIGATION
// ============================================================
let curTab = 'pgHome';
function switchTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('on', ['pgHome','pgVote','pgScan','pgShop','pgMe'][i] === id);
  });
  curTab = id;
  if (id === 'pgHome') renderHome();
  if (id === 'pgVote') renderVote();
  if (id === 'pgScan') renderScan();
  if (id === 'pgShop') renderShop();
  if (id === 'pgMe') renderMe();
}

function showToast(em, t, s) {
  const el = document.getElementById('toast');
  document.getElementById('toastEm').textContent = em;
  document.getElementById('toastT').textContent = t;
  document.getElementById('toastS').textContent = s || '';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

function goTest() {
  // Hide tab bar during test
  document.querySelector('.tabs').style.display = 'none';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pgTest').classList.add('on');

}

function returnFromTest() {
  document.querySelector('.tabs').style.display = 'flex';
  switchTab('pgHome');
}

// ============================================================
//  SCORING ALGORITHM — TOMO v2.0 (Q4/Q6/Q7参与计分，均衡分布)
// ============================================================
function getCode(qi){
  const a=testAns[qi];
  if(a===null||a===undefined)return[];
  if(Array.isArray(a))return a.map(i=>TQ[qi].o[i].code);
  return[TQ[qi].o[a].code];
}
function has(qi,code){return getCode(qi).includes(code);}
function q3val(){
  const a=testAns[2];
  if(a===null||a===undefined)return 0;
  const c=TQ[2].o[a].code;
  return parseInt(c.replace('bitter_',''))||0;
}

function calcPersona(){
  let sE=0,sB=0,sD=0;

  // Q1 Visual
  if(has(0,'visual_dark'))sE+=2;
  else if(has(0,'visual_light'))sD+=2;
  else if(has(0,'visual_medium'))sB+=1;

  // Q2 Aroma
  const q2=getCode(1);
  q2.forEach(c=>{
    if(c==='aroma_herbal')sE+=3;
    else if(c==='aroma_fruit')sB+=3;
    else if(c==='aroma_roast'){/* cross with Q3 */}
    else if(c==='aroma_alcohol')sE+=1;
    else if(c==='aroma_null')sD+=2;
  });
  if(q2.includes('aroma_roast')){
    if(q3val()>=3)sE+=2;else sD+=1;
  }

  // Q3 Bitter intensity
  const bv=q3val();
  if(bv===4)sE+=4;
  else if(bv===3)sE+=3;
  else if(bv===2)sB+=1;
  else if(bv===1)sD+=3;
  else if(bv===5){sD+=4;sE-=3;}

  // Q4 Bitter position — 参与计分
  if(has(3,'bitter_pos_throat'))sE+=1;
  else if(has(3,'bitter_pos_side'))sE+=1;
  else if(has(3,'bitter_pos_tip'))sB+=1;
  else if(has(3,'bitter_pos_null'))sD+=1;

  // Q5 Aftertaste
  if(has(4,'aftertaste_clean'))sD+=2;
  else if(has(4,'aftertaste_heavy')){
    if(sE>sB&&sE>sD)sE+=2;else sB+=2;
  }
  else if(has(4,'aftertaste_astringent'))sE+=1;
  else if(has(4,'aftertaste_null'))sD+=1;
  if(has(4,'aftertaste_heavy')&&q2.includes('aroma_roast'))sE+=1;

  // Q6 Scene — 参与计分
  if(has(5,'scene_solo'))sE+=1;
  else if(has(5,'scene_crowd'))sB+=2;
  else if(has(5,'scene_small'))sB+=1;
  else if(has(5,'scene_null'))sD+=1;

  // Q7 Acceptance — 参与计分
  if(has(6,'accept_repeat'))sB+=1;
  else if(has(6,'accept_stop'))sD+=1;

  // Q8 Motive — 扩展
  if(has(7,'motive_taste'))sE+=2;
  else if(has(7,'motive_social'))sB+=1;
  else if(has(7,'motive_feeling'))sB+=1;

  // Step 1: Primary quadrant
  const scores={edge:sE,bloom:sB,easy:sD};
  const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]);
  const primary=sorted[0][0];

  // Step 2: Cross-quadrant specials
  if(primary==='bloom'&&has(6,'accept_repeat')&&!has(7,'motive_social'))return PERSONAS[9]; // 果心
  if(primary==='edge'&&has(7,'motive_feeling')&&has(5,'scene_solo'))return PERSONAS[10];    // 深渊
  if(has(7,'motive_null')&&has(6,'accept_explore'))return PERSONAS[11];                      // 浅渡
  // 花信 跨象限入口：清爽+果香+非独饮
  if(has(4,'aftertaste_clean')&&q2.includes('aroma_fruit')&&!has(5,'scene_solo'))return PERSONAS[5];

  // Step 3: Sub-persona
  if(primary==='edge'){
    if(q3val()>=3&&has(3,'bitter_pos_throat'))return PERSONAS[0];  // 黑锋
    if(q3val()>=3&&has(3,'bitter_pos_side'))return PERSONAS[1];    // 铁饮
    if(q2.includes('aroma_herbal'))return PERSONAS[2];              // 猎浪
    if(q3val()>=4)return PERSONAS[0];                               // 黑锋：极苦兜底
    if(has(5,'scene_solo'))return PERSONAS[10];                      // 深渊：独饮EDGE
    if(has(6,'accept_explore'))return PERSONAS[2];                   // 猎浪：探索型EDGE
    return PERSONAS[1];                                              // 铁饮
  }
  if(primary==='bloom'){
    if(has(4,'aftertaste_heavy')||q2.includes('aroma_roast'))return PERSONAS[3]; // 蜜语
    if(has(7,'motive_social')||has(5,'scene_crowd'))return PERSONAS[4];          // 甜刺
    if(has(4,'aftertaste_clean'))return PERSONAS[5];                              // 花信
    if(has(6,'accept_explore'))return PERSONAS[4];                                // 甜刺
    return PERSONAS[3];                                                           // 蜜语
  }
  if(primary==='easy'){
    if(q2.includes('aroma_fruit')&&has(6,'accept_explore'))return PERSONAS[6];   // 清弦
    if(q2.includes('aroma_roast')&&has(7,'motive_taste'))return PERSONAS[7];     // 暗潮
    if(has(4,'aftertaste_heavy')&&!has(0,'visual_light'))return PERSONAS[8];     // 恒频
    if(has(6,'accept_repeat')&&(has(4,'aftertaste_heavy')||has(0,'visual_dark')||has(4,'aftertaste_astringent')))return PERSONAS[8]; // 恒频
    if(q2.includes('aroma_null')&&has(7,'motive_taste'))return PERSONAS[7];      // 暗潮
    if(has(5,'scene_solo')&&(has(4,'aftertaste_astringent')||has(7,'motive_taste')))return PERSONAS[7]; // 暗潮
    if(has(6,'accept_repeat'))return PERSONAS[8];                                 // 恒频
    if(has(0,'visual_dark')&&has(4,'aftertaste_astringent'))return PERSONAS[8];  // 恒频
    return PERSONAS[6];                                                           // 清弦
  }
  return PERSONAS[6];
}

  const barHTML = Array.from({length:8},(_,i) => `<div class="qb ${i<qi?'d':i===qi?'c':''}"></div>`).join('');
  document.getElementById('testArea').innerHTML = `
    <div style="text-align:left">
      <div class="qbar">${barHTML}</div>
      <div class="qn">问题 ${qi+1} / 8</div>
      <div class="qt serif">${q.title}</div>
      <div class="qo" id="tqo">
        ${q.o.map((o,oi) => `<div class="qopt" data-oi="${oi}" onclick="testPick(${qi},${oi},this)"><span class="em">${o.e}</span><span class="lb">${o.t}</span></div>`).join('')}
      </div>
      ${q.multi ? '<div style="font-size:11px;color:var(--t3);margin-top:8px;text-align:center">可多选，最多2个</div>' : ''}
    </div>
  `;
}

function testPick(qi, oi, el) {
  const q = TQ[qi];
  if (navigator.vibrate) navigator.vibrate(8);
  if (q.multi) {
    let sel = Array.isArray(testAns[qi]) ? testAns[qi] : [];
    const idx = sel.indexOf(oi);
    if (idx >= 0) { sel.splice(idx,1); el.classList.remove('sel'); }
    else {
      if (sel.length >= q.maxSel) { const old=sel.shift(); document.querySelector('#tqo [data-oi="'+old+'"]').classList.remove('sel'); }
      sel.push(oi); el.classList.add('sel');
    }
    testAns[qi] = sel.length ? [...sel] : null;
    // aroma_null is mutually exclusive with other aromas
    if(q.o[oi].code==='aroma_null'&&sel.includes(oi)){
      sel.forEach(s=>{if(s!==oi)document.querySelector('#tqo [data-oi="'+s+'"]').classList.remove('sel');});
      testAns[qi]=[oi];
    }else if(sel.length>0&&sel.some(s=>q.o[s].code==='aroma_null')&&q.o[oi].code!=='aroma_null'){
      const ni=q.o.findIndex(o=>o.code==='aroma_null');
      const si=sel.indexOf(ni);
      if(si>=0){sel.splice(si,1);document.querySelector('#tqo [data-oi="'+ni+'"]').classList.remove('sel');}
      testAns[qi]=[...sel];
    }
    if((testAns[qi]&&testAns[qi].length>=q.maxSel)||q.o[oi].code==='aroma_null'){
      setTimeout(() => testAdvance(qi), 600);
    }
  } else {
    testAns[qi] = oi;
    el.closest('.qo').querySelectorAll('.qopt').forEach(o => o.classList.remove('sel'));
    el.classList.add('sel');
    setTimeout(() => testAdvance(qi), 350);
  }
}

function testAdvance(qi) {
  if (qi < 7) { renderTestQ(qi + 1); }
  else { showTestResult(); }
}

function showScore() {
  const overlay = document.createElement('div');

      <div style="display:flex;justify-content:space-between;align-items:center;margin:max(30px, env(safe-area-inset-top)) 0 20px">

        <div style="font-size:22px;color:var(--gold);font-weight:700;margin:8px 0" class="serif">Jam·西风</div>

        ${[1,2,3,4,5].map(i => `<span style="font-size:36px;cursor:pointer;opacity:.3" onclick="rateStar(${i})" id="star${i}">★</span>`).join('')}

      <div style="text-align:center;font-size:13px;color:var(--t3);margin-bottom:20px" id="rateLabel">点击打分</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px">
        ${['苦','香','烈','顺','怪','惊喜','一般'].map(w => `<span style="background:var(--card);border:1px solid var(--card-b);border-radius:18px;padding:6px 14px;font-size:12px;color:var(--t2);cursor:pointer" onclick="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'">${w}</span>`).join('')}

  `;
  document.getElementById('app').appendChild(overlay);
}

function rateStar(n) {
  for (let i = 1; i <= 5; i++) {
    document.getElementById('star' + i).style.opacity = i <= n ? '1' : '.3';
    document.getElementById('star' + i).style.color = i <= n ? '#c9a84c' : '#fff';
  }
  const labels = ['','还行吧','不错','好喝','很好喝！','绝了！'];
  document.getElementById('rateLabel').textContent = labels[n];
  document.getElementById('rateLabel').style.color = '#c9a84c';
}

function submitScore() {
  U.hops += 10;
  showToast('⭐', '评分已提交！', '+10 酒花 · 声望已更新');
  setTimeout(() => { document.querySelector('[style*="z-index:50"]')?.remove(); }, 1000);
}

function showNaming() {
  const overlay = document.createElement('div');
  overlay.innerHTML = `
    <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:50;overflow-y:auto;padding:20px 20px 80px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin:max(30px, env(safe-area-inset-top)) 0 20px">

      <button class="btn" onclick="submitNaming()">提交命名</button>
    </div>
  `;
  document.getElementById('app').appendChild(overlay);
}

function submitNaming() {
  const name = document.getElementById('nameInput')?.value;
  if (!name) { showToast('❌', '请输入名字', ''); return; }
  showToast('✏️', 'Jam·' + name, '命名已提交！等待投票');
  setTimeout(() => { document.querySelector('[style*="z-index:50"]')?.remove(); }, 1000);
}

function redeemHops(cost) {
  if (U.hops < cost) return;
  U.hops -= cost;
  showToast('🎁', '兑换成功！', '凭此页面到吧台领取');
  setTimeout(() => renderMe(), 800);
}

renderHome();
</script>
