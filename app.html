<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TOMO · 共醸小程序模拟</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;600;700;900&display=swap');
:root{
  --gold:#c9a84c;--gold-l:#e8d48b;--gold-d:#8b6914;
  --bg:#0a0a12;--bg2:#111119;--bg3:#161622;
  --card:rgba(255,255,255,0.06);--card-b:rgba(255,255,255,0.12);
  --t1:#fff;--t2:#aaa;--t3:#666;--t4:#444;
  --edge:#2C2C34;--bloom:#7B68EE;--easy:#E8E8E8;--drop:#3D1C6E;
  --green:#4caf50;--red:#e53935;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--t1);font-family:'Noto Sans SC',sans-serif;touch-action:manipulation}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative}
.serif{font-family:'Noto Serif SC',serif}

/* === TAB BAR === */
.tabs{display:flex;background:var(--bg2);border-top:1px solid rgba(255,255,255,.06);padding:8px 0 max(8px, env(safe-area-inset-bottom));flex-shrink:0;position:fixed;bottom:0;left:0;right:0;z-index:10}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;transition:color .2s;color:var(--t3)}
.tab.on{color:var(--gold)}
.tab .ico{font-size:22px}
.tab .tl{font-size:10px;letter-spacing:1px}

/* === PAGES === */
.page{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:0 0 80px}
.page.on{display:block}
.ph{padding:16px 20px}
.section{padding:0 20px 16px}

/* === HEADER === */
.hdr{background:linear-gradient(180deg,rgba(201,168,76,.08),transparent);padding:max(54px, calc(env(safe-area-inset-top) + 16px)) 20px 16px;text-align:center}
.hdr h1{font-size:20px;color:var(--gold);font-weight:700;letter-spacing:2px}
.hdr .sub{font-size:11px;color:var(--t3);margin-top:4px}

/* === CARDS === */
.card{background:var(--card);border:1px solid var(--card-b);border-radius:16px;padding:16px;margin-bottom:12px}
.card-gold{background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.15)}
.card-title{font-size:12px;color:var(--t3);letter-spacing:2px;margin-bottom:10px}
.card-val{font-size:28px;color:var(--gold);font-weight:700}

/* === BUTTONS === */
.btn{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--gold),var(--gold-d));border:none;border-radius:14px;padding:14px;font-size:15px;color:#000;font-weight:700;letter-spacing:2px;cursor:pointer;width:100%;font-family:inherit;transition:transform .12s}
.btn:active{transform:scale(.97)}
.btn-g{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--gold);font-weight:500}
.btn-sm{padding:10px 16px;font-size:13px;border-radius:12px;width:auto}
.btn-dis{opacity:.4;pointer-events:none}

/* === CHECKIN === */
.checkin-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:12px 0}
.ck-day{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;color:var(--t3);background:var(--card);border:1px solid transparent;transition:all .2s}
.ck-day.done{background:rgba(201,168,76,.1);border-color:rgba(201,168,76,.2);color:var(--gold)}
.ck-day.today{border-color:var(--gold);color:var(--t1)}
.ck-day .ck-n{font-size:14px;font-weight:700}

/* === HOPS === */
.hops-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:20px;padding:4px 12px;font-size:13px;color:var(--gold)}
.hops-log{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.hops-log:last-child{border:none}

/* === REPUTATION === */
.rep-bar{height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;margin:6px 0 2px}
.rep-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-l));border-radius:3px;transition:width .8s ease}

/* === VOTE === */
.vote-card{background:var(--card);border:1px solid var(--card-b);border-radius:16px;padding:16px;margin-bottom:10px;cursor:pointer;transition:all .2s}
.vote-card.sel{border-color:var(--gold);background:rgba(201,168,76,.06)}
.vote-bar{height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden;margin-top:8px}
.vote-fill{height:100%;border-radius:3px;transition:width .6s ease}

/* === SLIDER === */
.slider-wrap{margin:16px 0}
.slider-label{display:flex;justify-content:space-between;font-size:11px;color:var(--t3);margin-bottom:6px}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(255,255,255,.06);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--gold);cursor:pointer;box-shadow:0 0 10px rgba(201,168,76,.3)}

/* === BLIND === */
.blind-cup{flex:1;background:var(--card);border:1px solid var(--card-b);border-radius:18px;padding:24px 16px;text-align:center;cursor:pointer;transition:all .2s}
.blind-cup.sel{border-color:var(--gold);background:rgba(201,168,76,.06)}
.blind-cup:active{transform:scale(.97)}
.blind-vs{display:flex;gap:12px;margin:16px 0}

/* === PROFILE === */
.avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#5a3d0a);display:flex;align-items:center;justify-content:center;font-size:30px;border:2px solid var(--gold);flex-shrink:0}
.level-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:18px;padding:3px 10px;font-size:11px;color:var(--gold)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0}
.stat{background:var(--card);border-radius:12px;padding:12px 6px;text-align:center}
.stat-n{font-size:22px;color:var(--gold);font-weight:700}
.stat-l{font-size:9px;color:var(--t3);margin-top:2px}

/* === RADAR === */
.radar-wrap{display:flex;justify-content:center;margin:12px 0}

/* === TIMELINE === */
.timeline{position:relative;padding-left:20px}
.timeline::before{content:'';position:absolute;left:4px;top:0;bottom:0;width:2px;background:linear-gradient(180deg,var(--gold),rgba(201,168,76,.06))}
.tl-item{position:relative;margin-bottom:14px;padding-left:14px}
.tl-item::before{content:'';position:absolute;left:-20px;top:4px;width:9px;height:9px;border-radius:50%;background:var(--gold);border:2px solid var(--bg)}
.tl-date{font-size:10px;color:var(--t3)}
.tl-text{font-size:12px;color:var(--t2);margin-top:1px;line-height:1.5}

/* === MOOD === */
.mood-opts{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}
.mood-opt{background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:16px;text-align:center;cursor:pointer;transition:all .2s}
.mood-opt:active{transform:scale(.97)}
.mood-opt.sel{border-color:var(--gold);background:rgba(201,168,76,.06)}
.mood-em{font-size:32px;margin-bottom:6px}
.mood-t{font-size:12px;color:var(--t2)}

/* === TOAST === */
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(0,0,0,.85);border:1px solid rgba(201,168,76,.3);border-radius:16px;padding:24px 32px;text-align:center;z-index:100;opacity:0;pointer-events:none;transition:all .3s}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
.toast-em{font-size:40px;margin-bottom:8px}
.toast-t{font-size:15px;color:var(--gold);font-weight:700}
.toast-s{font-size:12px;color:var(--t2);margin-top:4px}

/* === SCORE === */
.score-card{display:flex;align-items:center;gap:14px;background:var(--card-gold);border-radius:16px;padding:14px 16px;margin-bottom:12px}

/* === SKU LIST === */
.sku{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.sku:last-child{border:none}
.sku-bottle{width:36px;height:52px;background:linear-gradient(180deg,var(--gold),var(--gold-d));border-radius:5px 5px 3px 3px;position:relative;flex-shrink:0}
.sku-bottle::before{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);width:12px;height:7px;background:var(--gold);border-radius:3px 3px 0 0}
.sku-info{flex:1}
.sku-name{font-size:14px;font-weight:500}
.sku-desc{font-size:11px;color:var(--t3);margin-top:2px}
.sku-price{font-size:18px;color:var(--gold);font-weight:700}

/* notify dot */
.dot{width:8px;height:8px;background:var(--red);border-radius:50%;position:absolute;top:4px;right:calc(50% - 16px)}

/* === TEST QUESTIONS === */
.qbar{display:flex;gap:4px;margin-bottom:24px}
.qb{height:4px;flex:1;border-radius:2px;background:#1a1a24;transition:background .35s}
.qb.d{background:var(--gold)}.qb.c{background:linear-gradient(90deg,var(--gold),#333)}
.qn{font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:8px}
.qt{font-family:'Noto Serif SC',serif;font-size:20px;line-height:1.65;margin-bottom:24px}
.qo{display:flex;flex-direction:column;gap:10px}
.qopt{background:var(--card);border:1px solid var(--card-b);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .2s;-webkit-user-select:none;user-select:none}
.qopt:active{transform:scale(.98)}
.qopt .em{font-size:24px;flex-shrink:0}
.qopt .lb{font-size:13px;color:var(--t2);line-height:1.5}
.qopt.sel{background:rgba(201,168,76,.1);border-color:var(--gold)}
.qopt.sel .lb{color:var(--gold)}

/* === TEST RESULT CARD === */
.rc{background:var(--card);border:1px solid var(--card-b);border-radius:20px;padding:28px 20px;text-align:center;margin-bottom:16px}
.rc-edge{border-color:rgba(44,44,52,.5);background:linear-gradient(160deg,rgba(44,44,52,.15),rgba(0,0,0,.1))}
.rc-bloom{border-color:rgba(123,104,238,.2);background:linear-gradient(160deg,rgba(123,104,238,.06),rgba(0,0,0,.1))}
.rc-easy{border-color:rgba(232,232,232,.15);background:linear-gradient(160deg,rgba(232,232,232,.04),rgba(0,0,0,.1))}
.rc-drop{border-color:rgba(61,28,110,.3);background:linear-gradient(160deg,rgba(61,28,110,.1),rgba(0,0,0,.1))}
.rs{font-size:52px;margin-bottom:10px}
.rn{font-family:'Noto Serif SC',serif;font-size:28px;font-weight:700;color:var(--gold);margin-bottom:4px}
.re{font-size:13px;color:var(--t3);letter-spacing:2px;margin-bottom:6px}
.rt{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}
.rtg{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.15);border-radius:20px;padding:4px 12px;font-size:11px;color:var(--gold)}
@keyframes rpop{0%{opacity:0;transform:scale(.85) translateY(20px)}100%{opacity:1;transform:none}}

/* === PORTRAIT === */
.portrait{width:160px;height:160px;border-radius:50%;object-fit:cover;margin:0 auto 12px;display:block;border:3px solid rgba(201,168,76,.25);box-shadow:0 0 30px rgba(201,168,76,.08)}
.emoji-fb{font-size:52px;margin-bottom:10px}
</style>
</head>
<body>
<div id="app">

<!-- Pages -->
<div class="page on" id="pgHome"></div>

<div class="page" id="pgVote"></div>

<!-- Tab Bar -->
<div class="tabs">

</div>

<!-- Toast -->

</div>
<script>

//  USER STATE (simulated)
// ============================================================

    { d:'Day 45', t:'新酒命名「深海回响」入围TOP5', dt:'2026.07.30' },

    { d:'Day 7', t:'首次投票 · 七月共饮系列', dt:'2026.06.22' },

  ]
};

const SKUS = [
  { name:'Jam·烈奏', desc:'双倍浑浊IPA · ABV 9%', price:'¥40', quad:'♠EDGE' },
  { name:'Jam·西风', desc:'西海岸IPA · ABV 7%', price:'¥35', quad:'♠EDGE' },
  { name:'Jam·铁幕', desc:'英式苦啤ESB · ABV 5.5%', price:'¥35', quad:'♠EDGE' },
  { name:'Jam·蜜浪', desc:'芒果凤梨西打 · ABV 4%', price:'¥35', quad:'♥BLOOM' },

  { name:'Jam·青果', desc:'原榨苹果西打 · ABV 4.5%', price:'¥25', quad:'♥BLOOM' },
  { name:'Jam·晨雾', desc:'比利时小麦白啤 · ABV 4.5%', price:'¥18', quad:'♦EASY' },
  { name:'Jam·白噪', desc:'日式零糖皮尔森 · ABV 4.5%', price:'¥18', quad:'♦EASY' },
  { name:'Jam·暗流', desc:'零糖黑生 · ABV 4.5%', price:'¥18', quad:'♦EASY' },
  { name:'Jam·黑潮', desc:'燕麦世涛 · ABV 5.2%', price:'¥30', quad:'♠EDGE' },
];

const VOTES = [
  { name:'🧪 Jam·星潮', desc:'蝶豆花变色IPA · ABV 6.5%', votes:892, pct:0 },
  { name:'🍋 Jam·盐风', desc:'海盐柠檬古斯 · ABV 4.2%', votes:1103, pct:0 },
  { name:'🌶️ Jam·暗火', desc:'花椒烟熏波特 · ABV 5.8%', votes:647, pct:0 },
];
let votedI = -1;

// ============================================================
//  TAB NAVIGATION
// ============================================================
let curTab = 'pgHome';
function switchTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('on', ['pgHome','pgVote','pgScan','pgShop','pgMe'][i] === id);
  });
  curTab = id;
  if (id === 'pgHome') renderHome();
  if (id === 'pgVote') renderVote();
  if (id === 'pgScan') renderScan();
  if (id === 'pgShop') renderShop();
  if (id === 'pgMe') renderMe();
}

function showToast(em, t, s) {
  const el = document.getElementById('toast');
  document.getElementById('toastEm').textContent = em;
  document.getElementById('toastT').textContent = t;
  document.getElementById('toastS').textContent = s || '';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// ============================================================
//  TOMO TEST (embedded from index.html core logic)
// ============================================================
function goTest() {
  // Hide tab bar during test
  document.querySelector('.tabs').style.display = 'none';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
  document.getElementById('pgTest').classList.add('on');
  renderTest();
}

function returnFromTest() {
  document.querySelector('.tabs').style.display = 'flex';
  switchTab('pgHome');
}

let testGender = 'm';

function renderTest() {
  document.getElementById('pgTest').innerHTML = `
    <div style="padding:max(54px, env(safe-area-inset-top)) 20px 20px;text-align:center;max-width:420px;margin:0 auto">
      <div style="font-size:11px;color:var(--t3);letter-spacing:3px;margin-bottom:16px">TOMO · 味觉DNA测试</div>
      <div style="font-size:13px;color:var(--t2);line-height:1.8;margin-bottom:24px">
        手里端着 <b style="color:var(--gold)">Jam·晨雾</b>（测试酒）<br>
        边喝边答 · 不问偏好，问感知
      </div>
      <div id="testArea"></div>
    </div>
  `;
  testStep = 0;
  testAns = new Array(8).fill(null);
  renderGenderQ();
}

function renderGenderQ() {
  document.getElementById('testArea').innerHTML = `
    <div style="font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:10px">开始之前</div>

      <div class="qopt" style="flex-direction:column;width:120px;padding:24px 12px;text-align:center;justify-content:center" onclick="testGender='m';this.closest('div').querySelectorAll('.qopt').forEach(o=>o.classList.remove('sel'));this.classList.add('sel');setTimeout(()=>renderTestQ(0),400)">

      </div>
      <div class="qopt" style="flex-direction:column;width:120px;padding:24px 12px;text-align:center;justify-content:center" onclick="testGender='f';this.closest('div').querySelectorAll('.qopt').forEach(o=>o.classList.remove('sel'));this.classList.add('sel');setTimeout(()=>renderTestQ(0),400)">

      </div>
    </div>
    <div style="font-size:11px;color:var(--t3);margin-top:20px">仅影响人格形象展示</div>
  `;
}

function renderTestQ(qi) {
  const q = TQ[qi];
  const barHTML = Array.from({length:8},(_,i) => `<div class="qb ${i<qi?'d':i===qi?'c':''}"></div>`).join('');
  document.getElementById('testArea').innerHTML = `
    <div style="text-align:left">
      <div class="qbar">${barHTML}</div>
      <div class="qn">问题 ${qi+1} / 8</div>
      <div class="qt serif">${q.title}</div>
      <div class="qo" id="tqo">
        ${q.o.map((o,oi) => `<div class="qopt" data-oi="${oi}" onclick="testPick(${qi},${oi},this)"><span class="em">${o.e}</span><span class="lb">${o.t}</span></div>`).join('')}
      </div>
      ${q.multi ? '<div style="font-size:11px;color:var(--t3);margin-top:8px;text-align:center">可多选，最多2个</div>' : ''}
    </div>
  `;
}

function testPick(qi, oi, el) {
  const q = TQ[qi];
  if (navigator.vibrate) navigator.vibrate(8);
  if (q.multi) {
    let sel = Array.isArray(testAns[qi]) ? testAns[qi] : [];
    const idx = sel.indexOf(oi);
    if (idx >= 0) { sel.splice(idx,1); el.classList.remove('sel'); }
    else {
      if (sel.length >= q.maxSel) { const old=sel.shift(); document.querySelector('#tqo [data-oi="'+old+'"]').classList.remove('sel'); }
      sel.push(oi); el.classList.add('sel');
    }
    testAns[qi] = sel.length ? [...sel] : null;
    if (testAns[qi] && testAns[qi].length >= q.maxSel) setTimeout(() => testAdvance(qi), 600);
  } else {
    testAns[qi] = oi;
    el.closest('.qo').querySelectorAll('.qopt').forEach(o => o.classList.remove('sel'));
    el.classList.add('sel');
    setTimeout(() => testAdvance(qi), 350);
  }
}

function testAdvance(qi) {
  if (qi < 7) { renderTestQ(qi + 1); }
  else { showTestResult(); }
}

function doVote(i) {
  if (votedI === i) return;
  if (votedI >= 0) VOTES[votedI].votes--;
  votedI = i;
  VOTES[i].votes++;
  if (navigator.vibrate) navigator.vibrate(10);
  renderVote();
}

function confirmVote() {
  U.hops += 50;
  U.votes++;
  showToast('🗳️', '投票成功！', '+50 酒花 · 酒标将印你的编号');
  // remove dot
  document.querySelector('.dot').style.display = 'none';
}

function pickCup(c) {
  document.getElementById('cupA').classList.toggle('sel', c === 'A');
  document.getElementById('cupB').classList.toggle('sel', c === 'B');
  document.getElementById('blindResult').innerHTML = `
    <button class="btn" onclick="blindReveal('${c}')">确认选择 · 揭晓真相</button>
  `;
}

function blindReveal(c) {
  U.hops += 30;
  document.getElementById('blindResult').innerHTML = `
    <div class="card card-gold" style="margin-top:16px;text-align:center">
      <div style="font-size:14px;color:var(--gold);margin-bottom:8px">🎉 揭晓！</div>
      <div style="display:flex;gap:20px;justify-content:center;margin:12px 0">

        <div><div style="font-size:12px;color:var(--t3)">B杯</div><div style="font-size:15px;font-weight:700;color:${c==='B'?'var(--gold)':'var(--t2)'}">Jam·铁幕</div><div style="font-size:11px;color:var(--t3)">英式苦啤 · ¥35</div></div>
      </div>
      <div style="font-size:13px;color:var(--t2)">你选了 <b style="color:var(--gold)">${c}杯</b> · 品鉴力 +15</div>
      <div style="font-size:12px;color:var(--gold);margin-top:8px">+30 酒花 🌿</div>

  `;
  showToast('🥊', '盲品完成！', '+30 酒花 · 品鉴力 +15');
}

        <div style="font-size:20px;font-weight:700;color:var(--gold)" class="serif">🎚️ 风味滑块</div>

function submitSlider() {
  U.hops += 20;

  setTimeout(() => { document.querySelector('[style*="z-index:50"]')?.remove(); }, 1000);
}

function showScore() {
  const overlay = document.createElement('div');
  overlay.innerHTML = `
    <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:50;overflow-y:auto;padding:20px 20px 80px">

      </div>
      <div style="text-align:center;font-size:13px;color:var(--t3);margin-bottom:20px" id="rateLabel">点击打分</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px">
        ${['苦','香','烈','顺','怪','惊喜','一般'].map(w => `<span style="background:var(--card);border:1px solid var(--card-b);border-radius:18px;padding:6px 14px;font-size:12px;color:var(--t2);cursor:pointer" onclick="this.style.borderColor='var(--gold)';this.style.color='var(--gold)'">${w}</span>`).join('')}

    </div>
  `;
  document.getElementById('app').appendChild(overlay);

function rateStar(n) {
  for (let i = 1; i <= 5; i++) {
    document.getElementById('star' + i).style.opacity = i <= n ? '1' : '.3';
    document.getElementById('star' + i).style.color = i <= n ? '#c9a84c' : '#fff';
  }
  const labels = ['','还行吧','不错','好喝','很好喝！','绝了！'];
  document.getElementById('rateLabel').textContent = labels[n];
  document.getElementById('rateLabel').style.color = '#c9a84c';
}

function submitScore() {
  U.hops += 10;
  showToast('⭐', '评分已提交！', '+10 酒花 · 声望已更新');
  setTimeout(() => { document.querySelector('[style*="z-index:50"]')?.remove(); }, 1000);
}

function showNaming() {
  const overlay = document.createElement('div');
  overlay.innerHTML = `
    <div style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:50;overflow-y:auto;padding:20px 20px 80px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin:max(30px, env(safe-area-inset-top)) 0 20px">

      </div>
      <div style="font-size:11px;color:var(--t3);margin-bottom:16px">入围TOP5 = +100酒花 · 最终采纳 = 酒标署名</div>
      <button class="btn" onclick="submitNaming()">提交命名</button>
    </div>
  `;
  document.getElementById('app').appendChild(overlay);
}

function submitNaming() {
  const name = document.getElementById('nameInput')?.value;
  if (!name) { showToast('❌', '请输入名字', ''); return; }
  showToast('✏️', 'Jam·' + name, '命名已提交！等待投票');
  setTimeout(() => { document.querySelector('[style*="z-index:50"]')?.remove(); }, 1000);
}

    <!-- Hops Log -->

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div class="card-title" style="margin:0">🌿 酒花明细</div>
          <div class="hops-badge">🌿 ${U.hops}</div>

        ${U.hopsLog.map(l => `

    <!-- Hops Redeem -->
    <div class="section">
      <div class="card">
        <div class="card-title" style="margin-bottom:10px">🎁 酒花兑换</div>

        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)">
          <div><div style="font-size:13px">1杯任意象限</div><div style="font-size:10px;color:var(--t3)">任选一杯 · 体验兑换</div></div>
          <button class="btn btn-sm btn-dis">1000 🌿</button>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0">

function redeemHops(cost) {
  if (U.hops < cost) return;
  U.hops -= cost;
  showToast('🎁', '兑换成功！', '凭此页面到吧台领取');
  setTimeout(() => renderMe(), 800);
}

// ============================================================
renderHome();
</script>
